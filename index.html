<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dairy Manager</title>

  <!-- React aur Babel (JSX chalane ke liye) -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f4f8ff;
      display: flex;
      justify-content: center;
    }
    #root {
      width: 100%;
      max-width: 500px;
      min-height: 100vh;
      background: #fff;
      box-shadow: 0 0 20px rgba(0,0,0,0.05);
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <!-- Firebase Modern Modules Load aur Setup ho rahe hain background mein -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    
    // Inhe global window object mein daal rahe hain taaki tera App.jsx inhe access kar sake
    window.FirebaseApp = { initializeApp };
    window.FirebaseFirestore = { getFirestore, doc, setDoc, getDoc };
  </script>

  <!-- Is chote se delay ke sath tera main App render hoga taaki Firebase pehle load ho jaye -->
  <script type="text/babel">
    function Loader() {
      const [loaded, setLoaded] = React.useState(false);

      React.useEffect(() => {
        const checkFirebase = setInterval(() => {
          if (window.FirebaseApp && window.FirebaseFirestore) {
            setLoaded(true);
            clearInterval(checkFirebase);
          }
        }, 100);
        return () => clearInterval(checkFirebase);
      }, []);

      if (!loaded) {
        return (
          <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "#f4f8ff" }}>
            <div style={{ textAlign: "center", fontFamily: "Georgia,serif", color: "#7a90aa", fontWeight: 600 }}>
              <div style={{ fontSize: "48px" }}>🥛</div>
              <div>Starting Dairy...</div>
            </div>
          </div>
        );
      }

      return <DairyApp />;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Loader />);
  </script>

  <!-- Yahan se tera App.jsx load hoga -->
  <script type="text/babel" src="App.jsx"></script>

</body>
</html>
