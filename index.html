<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dairy Manager PRO</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f4f7fc;
      display: flex;
      justify-content: center;
      font-family: 'Barlow', sans-serif;
    }
    #root {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      background: #f4f7fc;
      box-shadow: 0 0 20px rgba(0,0,0,0.03);
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Firebase Credentials Setup
    const firebaseConfig = {
      apiKey: "AIzaSyAxadt7Kl7pwzfgcEm6G98jvF3Ki-AB34o",
      authDomain: "dairy-manager-6d898.firebaseapp.com",
      projectId: "dairy-manager-6d898",
      storageBucket: "dairy-manager-6d898.firebasestorage.app",
      messagingSenderId: "651048776070",
      appId: "1:651048776070:web:0ca12c6bdff39e2f303c07"
    };

    // Firebase App Initialization
    const firebaseApp = firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore(firebaseApp);

    // Database Sync Handlers
    async function load(key, def = []) {
      try {
        const snap = await db.collection("dairy").doc(key).get();
        if (snap.exists) return snap.data().value ?? def;
        return def;
      } catch (err) { 
        console.error("Load error:", err);
        return def; 
      }
    }

    async function save(key, data) {
      try {
        await db.collection("dairy").doc(key).set({ value: data });
      } catch (e) { 
        console.error("Save error:", e); 
      }
    }

    // ── CONSTANTS ───────────────────────────────────────────────────────
    const PRODUCTS = [
      { id: "milk",   label: "Milk",   icon: "🥛", unit: "L",  color: "#4a90d9", bg: "#f0f6ff" },
      { id: "dahi",   label: "Dahi",   icon: "🥣", unit: "Kg", color: "#c47d3a", bg: "#fff8ee" },
      { id: "paneer", label: "Paneer", icon: "🧀", unit: "Kg", color: "#8e44ad", bg: "#f8f0ff" },
      { id: "mahi",   label: "Mahi",   icon: "🫙", unit: "L",  color: "#3a7d44", bg: "#f0fbf3" },
    ];

    const TABS = [
      { id: "home",    label: "Home",     icon: "🏠" },
      { id: "quick",   label: "Quick",    icon: "⚡" },
      { id: "stockin", label: "Stock In", icon: "⬇️" },
      { id: "sales",   label: "Sales",    icon: "🛒" },
      { id: "reports", label: "Reports",  icon: "📊" },
    ];

    const REPORT_TABS = ["Summary", "Customers", "Expenses", "Settings"];

    const getP     = id => PRODUCTS.find(p => p.id === id) || PRODUCTS[0];
    const todayStr = () => new Date().toISOString().split("T")[0];
    const fmtDate  = d  => new Date(d).toLocaleDateString("en-IN", { day: "2-digit", month: "short", year: "numeric" });
    const fmtCur   = n  => "₹" + parseFloat(n || 0).toFixed(0);
    const fmtQty   = (q, u) => `${parseFloat(q).toFixed(1)} ${u}`;
    const monthOf  = d  => d?.slice(0, 7);
    const nowMonth = () => todayStr().slice(0, 7);

    // ── UI ATOMS ────────────────────────────────────────────────────────
    function Lbl({ children }) {
      return <div style={{ fontSize: 11, color: "#6b7c93", fontWeight: 700, textTransform: "uppercase", letterSpacing: 1, marginBottom: 4 }}>{children}</div>;
    }
    function Card({ children, style = {} }) {
      return <div style={{ background: "#fff", borderRadius: 18, padding: "15px", marginBottom: 12, boxShadow: "0 2px 16px rgba(74,144,217,0.07)", border: "1px solid #e8f0fb", ...style }}>{children}</div>;
    }
    function SecTitle({ children, color = "#4a90d9" }) {
      return <div style={{ fontSize: 13, fontWeight: 800, color, marginBottom: 12 }}>{children}</div>;
    }
    function Input({ label, ...props }) {
      return (
        <div style={{ marginBottom: 12 }}>
          {label && <Lbl>{label}</Lbl>}
          <input {...props} style={{ width: "100%", boxSizing: "border-box", padding: "12px 14px", borderRadius: 12, border: "1.5px solid #dce4ef", fontSize: 15, background: "#f8fbff", color: "#1a2a3a", fontFamily: "inherit", outline: "none", ...(props.style || {}) }} />
        </div>
      );
    }
    function Btn({ children, onClick, color = "#4a90d9", style = {}, small }) {
      return (
        <button onClick={onClick} style={{ background: color, color: "#fff", border: "none", borderRadius: small ? 8 : 14, padding: small ? "6px 12px" : "14px", fontSize: small ? 12 : 15, fontWeight: 700, cursor: "pointer", width: small ? "auto" : "100%", fontFamily: "inherit", ...style }}>{children}</button>
      );
    }
    function StatBox({ icon, label, value, color, bg }) {
      return (
        <div style={{ background: bg, borderRadius: 16, padding: "12px 8px", textAlign: "center", border: `1.5px solid ${color}22` }}>
          <div style={{ fontSize: 22 }}>{icon}</div>
          <div style={{ fontSize: 16, fontWeight: 800, color, marginTop: 3 }}>{value}</div>
          <div style={{ fontSize: 10, color: "#7a90aa", marginTop: 2, fontWeight: 600 }}>{label}</div>
        </div>
      );
    }
    function ProductPicker({ value, onChange }) {
      return (
        <div style={{ marginBottom: 14 }}>
          <Lbl>Product</Lbl>
          <div style={{ display: "flex", gap: 7 }}>
            {PRODUCTS.map(p => (
              <button key={p.id} onClick={() => onChange(p.id)} style={{ flex: 1, padding: "9px 4px", borderRadius: 12, border: "2px solid", borderColor: value === p.id ? p.color : "#dce4ef", background: value === p.id ? p.bg : "#f8fbff", color: value === p.id ? p.color : "#9aafcc", cursor: "pointer", fontFamily: "inherit", fontWeight: 700, fontSize: 10, display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
                <span style={{ fontSize: 20 }}>{p.icon}</span><span>{p.label}</span>
              </button>
            ))}
          </div>
        </div>
      );
    }
    function SearchBar({ value, onChange, placeholder = "Search…" }) {
      return (
        <div style={{ position: "relative", marginBottom: 12 }}>
          <span style={{ position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)", fontSize: 14, color: "#9aafcc" }}>🔍</span>
          <input value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} style={{ width: "100%", boxSizing: "border-box", padding: "10px 12px 10px 34px", borderRadius: 12, border: "1.5px solid #dce4ef", fontSize: 14, background: "#f8fbff", color: "#1a2a3a", fontFamily: "inherit", outline: "none" }} />
          {value && <span onClick={() => onChange("")} style={{ position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)", cursor: "pointer", color: "#9aafcc", fontSize: 16 }}>✕</span>}
        </div>
      );
    }

    function EditModal({ entry, type, onSave, onClose }) {
      const p = getP(entry.product || "milk");
      const [form, setForm] = useState({ ...entry });
      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
      return (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.45)", zIndex: 500, display: "flex", alignItems: "flex-end" }}>
          <div style={{ background: "#fff", borderRadius: "24px 24px 0 0", padding: "20px 16px 32px", width: "100%", maxHeight: "90vh", overflowY: "auto", boxSizing: "border-box" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <div style={{ fontSize: 16, fontWeight: 800, color: "#1a2a3a" }}>✏️ Edit Entry</div>
              <button onClick={onClose} style={{ background: "#f0f4fa", border: "none", borderRadius: 8, padding: "6px 10px", cursor: "pointer", fontSize: 16 }}>✕</button>
            </div>
            <Input label="Date" type="date" value={form.date} onChange={e => set("date", e.target.value)} />
            <Input label={type === "stockin" ? "Supplier" : "Customer"} value={form[type === "stockin" ? "supplier" : "customer"] || ""} onChange={e => set(type === "stockin" ? "supplier" : "customer", e.target.value)} />
            <div style={{ display: "flex", gap: 10 }}>
              <div style={{ flex: 1 }}><Input label={`Qty (${p.unit})`} type="number" value={form.qty} onChange={e => set("qty", parseFloat(e.target.value) || 0)} /></div>
              <div style={{ flex: 1 }}><Input label={`Rate ₹/${p.unit}`} type="number" value={form.rate} onChange={e => set("rate", parseFloat(e.target.value) || 0)} /></div>
            </div>
            <Input label="Notes (optional)" placeholder="Any remarks…" value={form.notes || ""} onChange={e => set("notes", e.target.value)} />
            <Btn onClick={() => onSave(form)} color="#4a90d9">Save Changes</Btn>
          </div>
        </div>
      );
    }

    function EntryCard({ e, type, onDelete, onEdit, onMarkPaid }) {
      const pr = getP(e.product);
      return (
        <Card>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
            <div style={{ flex: 1 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }}>
                <span style={{ background: pr.bg, color: pr.color, borderRadius: 8, padding: "2px 8px", fontSize: 11, fontWeight: 800 }}>{pr.icon} {pr.label}</span>
              </div>
              <div style={{ fontSize: 15, fontWeight: 700, color: "#1a2a3a" }}>{type === "stockin" ? e.supplier : e.customer}</div>
              <div style={{ fontSize: 11, color: "#7a90aa", marginTop: 2 }}>{fmtDate(e.date)} · {fmtQty(e.qty, pr.unit)} @ {fmtCur(e.rate)}/{pr.unit}</div>
              {type === "sales" && <div style={{ fontSize: 15, fontWeight: 800, color: e.paid ? "#3a7d44" : "#e53935", marginTop: 3 }}>{fmtCur(e.qty * e.rate)} <span style={{ fontSize: 11, fontWeight: 500 }}>{e.paid ? "✓ Paid" : "⏳ Due"}</span></div>}
              {e.notes && <div style={{ fontSize: 11, color: "#8a9ab0", marginTop: 3, fontStyle: "italic" }}>📝 {e.notes}</div>}
            </div>
            <div style={{ display: "flex", gap: 5, marginLeft: 8, flexDirection: "column", alignItems: "flex-end" }}>
              {type === "sales" && !e.paid && <Btn onClick={() => onMarkPaid(e.id)} color="#3a7d44" small>✓ Paid</Btn>}
              <div style={{ display: "flex", gap: 5 }}>
                <button onClick={() => onEdit(e)} style={{ background: "#f0f6ff", border: "none", borderRadius: 8, padding: "7px 9px", cursor: "pointer", fontSize: 13 }}>✏️</button>
                <button onClick={() => onDelete(e.id)} style={{ background: "#fff0ee", border: "none", borderRadius: 8, padding: "7px 9px", cursor: "pointer", fontSize: 13 }}>🗑️</button>
              </div>
            </div>
          </div>
        </Card>
      );
    }
    // ── ⚡ QUICK TAB ─────────────────────────────────────────────────────
    function QuickTab({ sales, setSales, dailyCustomers, setDailyCustomers }) {
      const [activeCard, setActiveCard] = useState(null);
      const [qty, setQty] = useState("");
      const [paid, setPaid] = useState(true);
      const [flash, setFlash] = useState(null);
      const [showAdd, setShowAdd] = useState(false);
      const [newName, setNewName] = useState("");
      const [newProduct, setNewProduct] = useState("milk");
      const [newRate, setNewRate] = useState("");
      const [newPaidDefault, setNewPaidDefault] = useState(true);

      async function saveDC(updated) { setDailyCustomers(updated); await save("dairy-daily-customers", updated); }

      async function addDailyCustomer() {
        if (!newName.trim() || !newRate) return;
        await saveDC([...dailyCustomers, { name: newName.trim(), product: newProduct, rate: parseFloat(newRate), paidDefault: newPaidDefault }]);
        setNewName(""); setNewRate(""); setShowAdd(false);
      }

      async function removeCustomer(idx) {
        await saveDC(dailyCustomers.filter((_, i) => i !== idx));
        if (activeCard === idx) setActiveCard(null);
      }

      async function submitQuickSale() {
        if (activeCard === null || !qty) return;
        const c = dailyCustomers[activeCard];
        const e = { id: Date.now(), product: c.product, date: todayStr(), customer: c.name, qty: parseFloat(qty), rate: c.rate, paid, notes: "" };
        const u = [e, ...sales]; setSales(u); await save("dairy-sales", u);
        setFlash(activeCard); setQty(""); setActiveCard(null);
        setTimeout(() => setFlash(null), 2000);
      }

      const todaySales = sales.filter(e => e.date === todayStr());
      const todayRev = todaySales.filter(e => e.paid).reduce((s, e) => s + e.qty * e.rate, 0);

      return (
        <div>
          <div style={{ background: "linear-gradient(135deg,#4a90d9,#357abd)", borderRadius: 18, padding: "14px 18px", marginBottom: 16, color: "#fff", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div><div style={{ fontSize: 13, opacity: 0.85 }}>Today's Sales</div><div style={{ fontSize: 24, fontWeight: 900, marginTop: 2 }}>{fmtCur(todayRev)}</div></div>
            <div style={{ textAlign: "right" }}><div style={{ fontSize: 13, opacity: 0.85 }}>Entries</div><div style={{ fontSize: 24, fontWeight: 900 }}>{todaySales.length}</div></div>
          </div>

          <SecTitle>⚡ Daily Customers — One Tap Entry</SecTitle>

          {dailyCustomers.length === 0 && !showAdd && (
            <Card style={{ textAlign: "center", padding: 28 }}>
              <div style={{ fontSize: 36 }}>👥</div>
              <div style={{ fontWeight: 700, fontSize: 15, color: "#4a90d9", marginTop: 8 }}>No daily customers yet!</div>
              <div style={{ color: "#7a90aa", fontSize: 13, marginTop: 4 }}>Add your regular customers below.</div>
            </Card>
          )}

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 16 }}>
            {dailyCustomers.map((c, idx) => {
              const pp = getP(c.product);
              const isActive = activeCard === idx;
              const didFlash = flash === idx;
              const alreadyDone = todaySales.some(e => e.customer === c.name && e.product === c.product);
              return (
                <button key={idx} onClick={() => { setActiveCard(isActive ? null : idx); setQty(""); setPaid(c.paidDefault ?? true); }}
                  style={{ background: didFlash ? "#f0fbf3" : isActive ? pp.bg : "#fff", borderRadius: 16, padding: "14px 10px", border: `2px solid ${didFlash ? "#3a7d44" : isActive ? pp.color : "#e8f0fb"}`, cursor: "pointer", fontFamily: "inherit", textAlign: "center", position: "relative", boxShadow: isActive ? "0 4px 20px rgba(74,144,217,0.15)" : "0 2px 8px rgba(0,0,0,0.05)" }}>
                  {alreadyDone && <div style={{ position: "absolute", top: 6, right: 8, fontSize: 12 }}>✅</div>}
                  <button onClick={e => { e.stopPropagation(); removeCustomer(idx); }} style={{ position: "absolute", top: 5, left: 7, background: "#fff0ee", border: "none", borderRadius: 6, padding: "2px 5px", cursor: "pointer", fontSize: 11, color: "#e53935" }}>✕</button>
                  <div style={{ fontSize: 26, marginTop: 4 }}>{pp.icon}</div>
                  <div style={{ fontSize: 13, fontWeight: 800, color: "#1a2a3a", marginTop: 4 }}>{c.name}</div>
                  <div style={{ fontSize: 11, color: pp.color, fontWeight: 700, marginTop: 2 }}>{pp.label} · {fmtCur(c.rate)}/{pp.unit}</div>
                  {didFlash && <div style={{ fontSize: 11, color: "#3a7d44", fontWeight: 700, marginTop: 3 }}>✓ Saved!</div>}
                </button>
              );
            })}
          </div>

          {activeCard !== null && dailyCustomers[activeCard] && (() => {
            const c = dailyCustomers[activeCard];
            const pp = getP(c.product);
            return (
              <Card style={{ border: `2px solid ${pp.color}`, marginBottom: 16 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
                  <span style={{ fontSize: 28 }}>{pp.icon}</span>
                  <div><div style={{ fontSize: 16, fontWeight: 800, color: "#1a2a3a" }}>{c.name}</div><div style={{ fontSize: 12, color: pp.color, fontWeight: 600 }}>{pp.label} · {fmtCur(c.rate)}/{pp.unit}</div></div>
                </div>
                <Input label={`Quantity (${pp.unit})`} type="number" placeholder={`How much ${pp.label}?`} value={qty} onChange={e => setQty(e.target.value)} style={{ fontSize: 20, fontWeight: 700, textAlign: "center" }} />
                {qty && !isNaN(qty) && (
                  <div style={{ background: pp.bg, borderRadius: 12, padding: "10px", marginBottom: 12, textAlign: "center", border: `1px dashed ${pp.color}` }}>
                    <span style={{ fontSize: 13, color: "#5a6a7a" }}>Total: </span>
                    <span style={{ fontSize: 22, fontWeight: 900, color: pp.color }}>{fmtCur(parseFloat(qty) * c.rate)}</span>
                  </div>
                )}
                <Lbl>Payment</Lbl>
                <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
                  {[true, false].map(p => (
                    <button key={p} onClick={() => setPaid(p)} style={{ flex: 1, padding: "10px", borderRadius: 12, fontFamily: "inherit", border: "2px solid", cursor: "pointer", fontSize: 13, fontWeight: 700, borderColor: paid === p ? (p ? "#3a7d44" : "#e53935") : "#dce4ef", background: paid === p ? (p ? "#f0fbf3" : "#fff0ee") : "#f8fbff", color: paid === p ? (p ? "#3a7d44" : "#e53935") : "#7a90aa" }}>{p ? "✅ Paid" : "📒 Credit"}</button>
                  ))}
                </div>
                <Btn onClick={submitQuickSale} color={pp.color}>⚡ Save Entry</Btn>
              </Card>
            );
          })()}

          {todaySales.length > 0 && (
            <Card>
              <SecTitle>📋 Today's Entries</SecTitle>
              {[...todaySales].sort((a, b) => b.id - a.id).map(e => {
                const pp = getP(e.product);
                return (
                  <div key={e.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: "1px solid #f0f4fa" }}>
                    <div>
                      <div style={{ fontSize: 13, fontWeight: 700, color: "#1a2a3a" }}>{pp.icon} {e.customer}</div>
                      <div style={{ fontSize: 11, color: "#7a90aa" }}>{fmtQty(e.qty, pp.unit)} @ {fmtCur(e.rate)}/{pp.unit}</div>
                    </div>
                    <div style={{ textAlign: "right" }}>
                      <div style={{ fontSize: 14, fontWeight: 800, color: e.paid ? "#3a7d44" : "#e53935" }}>{fmtCur(e.qty * e.rate)}</div>
                      <div style={{ fontSize: 10, color: e.paid ? "#3a7d44" : "#e53935" }}>{e.paid ? "✓ Paid" : "Due"}</div>
                    </div>
                  </div>
                );
              })}
            </Card>
          )}

          {!showAdd ? (
            <button onClick={() => setShowAdd(true)} style={{ width: "100%", padding: "14px", borderRadius: 14, border: "2px dashed #4a90d9", background: "#f0f6ff", color: "#4a90d9", fontWeight: 700, fontSize: 14, cursor: "pointer", fontFamily: "inherit" }}>
              + Add Daily Customer
            </button>
          ) : (
            <Card style={{ border: "2px solid #4a90d9" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                <SecTitle>➕ New Daily Customer</SecTitle>
                <button onClick={() => setShowAdd(false)} style={{ background: "#f0f4fa", border: "none", borderRadius: 8, padding: "5px 9px", cursor: "pointer", fontSize: 14 }}>✕</button>
              </div>
              <Input label="Customer Name" placeholder="e.g. Ramesh..." value={newName} onChange={e => setNewName(e.target.value)} />
              <ProductPicker value={newProduct} onChange={setNewProduct} />
              <Input label={`Default Rate ₹/${getP(newProduct).unit}`} type="number" placeholder="60" value={newRate} onChange={e => setNewRate(e.target.value)} />
              <Lbl>Default Payment</Lbl>
              <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
                {[true, false].map(p => (
                  <button key={p} onClick={() => setNewPaidDefault(p)} style={{ flex: 1, padding: "10px", borderRadius: 12, fontFamily: "inherit", border: "2px solid", cursor: "pointer", fontSize: 13, fontWeight: 700, borderColor: newPaidDefault === p ? (p ? "#3a7d44" : "#e53935") : "#dce4ef", background: newPaidDefault === p ? (p ? "#f0fbf3" : "#fff0ee") : "#f8fbff", color: newPaidDefault === p ? (p ? "#3a7d44" : "#e53935") : "#7a90aa" }}>{p ? "✅ Paid" : "📒 Credit"}</button>
                ))}
              </div>
              <Btn onClick={addDailyCustomer} color="#4a90d9">Save Customer</Btn>
            </Card>
          )}
        </div>
      );
    }

    // ── HOME TAB ────────────────────────────────────────────────────────
    function HomeTab({ stockIn, sales, settings }) {
      const t = todayStr();
      const todayIn = stockIn.filter(e => e.date === t).reduce((s, e) => s + e.qty, 0);
      const todaySold = sales.filter(e => e.date === t).reduce((s, e) => s + e.qty, 0);
      const todayRev = sales.filter(e => e.date === t && e.paid).reduce((s, e) => s + e.qty * e.rate, 0);
      const totalDues = sales.filter(e => !e.paid).reduce((s, e) => s + e.qty * e.rate, 0);
      const totalEarned = sales.filter(e => e.paid).reduce((s, e) => s + e.qty * e.rate, 0);

      const stockMap = {};
      PRODUCTS.forEach(p => { stockMap[p.id] = 0; });
      stockIn.forEach(e => { stockMap[e.product] = (stockMap[e.product] || 0) + e.qty; });
      sales.forEach(e => { stockMap[e.product] = (stockMap[e.product] || 0) - e.qty; });

      const duesMap = {};
      sales.filter(e => !e.paid).forEach(e => { duesMap[e.customer] = (duesMap[e.customer] || 0) + e.qty * e.rate; });
      const topDues = Object.entries(duesMap).sort((a, b) => b[1] - a[1]).slice(0, 3);
      const recent = [...sales].sort((a, b) => b.id - a.id).slice(0, 4);

      function shareWhatsApp() {
        const lowStock = PRODUCTS.filter(p => (stockMap[p.id] || 0) < (settings?.thresholds?.[p.id] ?? 5));
        const lines = [`🥛 *Dairy Report — ${fmtDate(t)}*`, ``, `📥 Received: ${todayIn.toFixed(1)}L`, `🛒 Sold: ${todaySold.toFixed(1)}L`, `💰 Earnings: ${fmtCur(todayRev)}`, `📦 Total Earned: ${fmtCur(totalEarned)}`, `📒 Pending Dues: ${fmtCur(totalDues)}`];
        if (lowStock.length) lines.push(``, `⚠️ Low Stock: ` + lowStock.map(p => `${p.icon}${p.label}`).join(", "));
        if (topDues.length) { lines.push(``, "📒 Top Dues:"); topDues.forEach(([n, a]) => lines.push(`  • ${n}: ${fmtCur(a)}`)); }
        window.open(`https://wa.me/?text=${encodeURIComponent(lines.join("\n"))}`, "_blank");
      }

      return (
        <div>
          <div style={{ background: "linear-gradient(135deg,#4a90d9,#357abd)", borderRadius: 20, padding: "18px 20px", marginBottom: 16, color: "#fff", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div><div style={{ fontSize: 22, fontWeight: 900 }}>Good Day! 👋</div><div style={{ fontSize: 13, opacity: 0.85, marginTop: 2 }}>{fmtDate(t)}</div></div>
            <button onClick={shareWhatsApp} style={{ background: "rgba(255,255,255,0.2)", border: "none", borderRadius: 12, padding: "10px 14px", color: "#fff", cursor: "pointer", fontFamily: "inherit", fontWeight: 700, fontSize: 12, display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
              <span style={{ fontSize: 20 }}>📤</span><span>Share</span>
            </button>
          </div>

          <Lbl>Today's Summary</Lbl>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 14 }}>
            <StatBox icon="⬇️" label="Received" value={`${todayIn.toFixed(1)}L`} color="#3a7d44" bg="#f0fbf3" />
            <StatBox icon="🛒" label="Sold" value={`${todaySold.toFixed(1)}L`} color="#c47d3a" bg="#fff8ee" />
            <StatBox icon="💰" label="Today's Earnings" value={fmtCur(todayRev)} color="#4a90d9" bg="#f0f6ff" />
            <StatBox icon="📒" label="Total Dues" value={fmtCur(totalDues)} color="#e53935" bg="#fff0ee" />
          </div>

          <Lbl>Current Stock</Lbl>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 14 }}>
            {PRODUCTS.map(p => {
              const net = stockMap[p.id] || 0;
              const low = net < (settings?.thresholds?.[p.id] ?? 5);
              return <StatBox key={p.id} icon={p.icon} label={p.label} value={`${net.toFixed(1)} ${p.unit}`} color={low ? "#e53935" : p.color} bg={low ? "#fff0ee" : p.bg} />;
            })}
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 14 }}>
            <Card style={{ margin: 0, textAlign: "center" }}><Lbl>Total Earned</Lbl><div style={{ fontSize: 20, fontWeight: 900, color: "#3a7d44" }}>{fmtCur(totalEarned)}</div></Card>
            <Card style={{ margin: 0, textAlign: "center" }}><Lbl>This Month</Lbl><div style={{ fontSize: 20, fontWeight: 900, color: "#4a90d9" }}>{fmtCur(sales.filter(e => e.paid && monthOf(e.date) === nowMonth()).reduce((s, e) => s + e.qty * e.rate, 0))}</div></Card>
          </div>

          {topDues.length > 0 && (
            <Card style={{ border: "1.5px solid #ffd0cc" }}>
              <SecTitle color="#e53935">⏰ Pending Dues</SecTitle>
              {topDues.map(([name, amt]) => (
                <div key={name} style={{ display: "flex", justifyContent: "space-between", padding: "7px 0", borderBottom: "1px solid #fef0ee" }}>
                  <span style={{ fontSize: 14, color: "#1a2a3a", fontWeight: 600 }}>{name}</span>
                  <span style={{ fontSize: 14, fontWeight: 800, color: "#e53935" }}>{fmtCur(amt)}</span>
                </div>
              ))}
            </Card>
          )}

          {recent.length > 0 && (
            <Card>
              <SecTitle>🕐 Recent Sales</SecTitle>
              {recent.map(e => {
                const pr = getP(e.product);
                return (
                  <div key={e.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "7px 0", borderBottom: "1px solid #f0f4fa" }}>
                    <div><div style={{ fontSize: 13, fontWeight: 700, color: "#1a2a3a" }}>{pr.icon} {e.customer}</div><div style={{ fontSize: 11, color: "#7a90aa" }}>{fmtDate(e.date)} · {fmtQty(e.qty, pr.unit)}</div></div>
                    <div style={{ textAlign: "right" }}><div style={{ fontSize: 13, fontWeight: 800, color: e.paid ? "#3a7d44" : "#e53935" }}>{fmtCur(e.qty * e.rate)}</div><div style={{ fontSize: 10, color: e.paid ? "#3a7d44" : "#e53935" }}>{e.paid ? "✓ Paid" : "Due"}</div></div>
                  </div>
                );
              })}
            </Card>
          )}
        </div>
      );
    }

    // ── STOCK IN TAB ───────────────────────────────────────────────────
    function StockInTab({ stockIn, setStockIn }) {
      const [product, setProduct] = useState("milk");
      const [date, setDate] = useState(todayStr());
      const [supplier, setSupplier] = useState("");
      const [qty, setQty] = useState("");
      const [rate, setRate] = useState("");
      const [notes, setNotes] = useState("");
      const [flash, setFlash] = useState(false);
      const [search, setSearch] = useState("");
      const [filterP, setFilterP] = useState("all");
      const [editEntry, setEditEntry] = useState(null);
      const pr = getP(product);

      async function add() {
        if (!supplier.trim() || !qty) return;
        const e = { id: Date.now(), product, date, supplier: supplier.trim(), qty: parseFloat(qty), rate: parseFloat(rate) || 0, notes: notes.trim() };
        const u = [e, ...stockIn]; setStockIn(u); await save("dairy-stock-in", u);
        setSupplier(""); setQty(""); setRate(""); setNotes("");
        setFlash(true); setTimeout(() => setFlash(false), 1600);
      }
      async function del(id) { const u = stockIn.filter(e => e.id !== id); setStockIn(u); await save("dairy-stock-in", u); }
      async function saveEdit(updated) { const u = stockIn.map(e => e.id === updated.id ? updated : e); setStockIn(u); await save("dairy-stock-in", u); setEditEntry(null); }

      const shown = [...stockIn].sort((a, b) => b.id - a.id).filter(e => (filterP === "all" || e.product === filterP) && (!search || (e.supplier || "").toLowerCase().includes(search.toLowerCase())));

      return (
        <div>
          {editEntry && <EditModal entry={editEntry} type="stockin" onSave={saveEdit} onClose={() => setEditEntry(null)} />}
          <Card>
            <SecTitle>⬇️ Add Stock Received</SecTitle>
            <ProductPicker value={product} onChange={setProduct} />
            <Input label="Date" type="date" value={date} onChange={e => setDate(e.target.value)} />
            <Input label="Supplier Name" placeholder="e.g. Ramu Dairy…" value={supplier} onChange={e => setSupplier(e.target.value)} />
            <div style={{ display: "flex", gap: 10 }}>
              <div style={{ flex: 1 }}><Input label={`Qty (${pr.unit})`} type="number" placeholder="40" value={qty} onChange={e => setQty(e.target.value)} /></div>
              <div style={{ flex: 1 }}><Input label={`Rate ₹/${pr.unit}`} type="number" placeholder="50" value={rate} onChange={e => setRate(e.target.value)} /></div>
            </div>
            <Input label="Notes (optional)" placeholder="Any remarks…" value={notes} onChange={e => setNotes(e.target.value)} />
            <Btn onClick={add} color={flash ? "#3a7d44" : pr.color}>{flash ? "✅ Entry Saved!" : "Save Entry"}</Btn>
          </Card>
          <SearchBar value={search} onChange={setSearch} placeholder="Search supplier…" />
          {shown.map(e => <EntryCard key={e.id} e={e} type="stockin" onDelete={del} onEdit={setEditEntry} onMarkPaid={() => {}} />)}
        </div>
      );
    }
    // ── SALES TAB ──────────────────────────────────────────────────────
    function SalesTab({ sales, setSales }) {
      const [product, setProduct] = useState("milk");
      const [date, setDate] = useState(todayStr());
      const [customer, setCustomer] = useState("");
      const [qty, setQty] = useState("");
      const [rate, setRate] = useState("");
      const [notes, setNotes] = useState("");
      const [paid, setPaid] = useState(true);
      const [flash, setFlash] = useState(false);
      const [search, setSearch] = useState("");
      const [filterP, setFilterP] = useState("all");
      const [editEntry, setEditEntry] = useState(null);
      const pr = getP(product);

      async function add() {
        if (!customer.trim() || !qty) return;
        const e = { id: Date.now(), product, date, customer: customer.trim(), qty: parseFloat(qty), rate: parseFloat(rate) || 0, paid, notes: notes.trim() };
        const u = [e, ...sales]; setSales(u); await save("dairy-sales", u);
        setCustomer(""); setQty(""); setRate(""); setNotes("");
        setFlash(true); setTimeout(() => setFlash(false), 1600);
      }
      async function del(id) { const u = sales.filter(e => e.id !== id); setSales(u); await save("dairy-sales", u); }
      async function saveEdit(updated) { const u = sales.map(e => e.id === updated.id ? updated : e); setSales(u); await save("dairy-sales", u); setEditEntry(null); }
      async function markPaid(id) { const u = sales.map(e => e.id === id ? { ...e, paid: true } : e); setSales(u); await save("dairy-sales", u); }

      const shown = [...sales].sort((a, b) => b.id - a.id).filter(e => (filterP === "all" || e.product === filterP) && (!search || (e.customer || "").toLowerCase().includes(search.toLowerCase())));

      return (
        <div>
          {editEntry && <EditModal entry={editEntry} type="sales" onSave={saveEdit} onClose={() => setEditEntry(null)} />}
          <Card>
            <SecTitle>🛒 Add Casual Sale</SecTitle>
            <ProductPicker value={product} onChange={setProduct} />
            <Input label="Date" type="date" value={date} onChange={e => setDate(e.target.value)} />
            <Input label="Customer Name" placeholder="Walk-in Customer..." value={customer} onChange={e => setCustomer(e.target.value)} />
            <div style={{ display: "flex", gap: 10 }}>
              <div style={{ flex: 1 }}><Input label={`Qty (${pr.unit})`} type="number" placeholder="2" value={qty} onChange={e => setQty(e.target.value)} /></div>
              <div style={{ flex: 1 }}><Input label={`Rate ₹/${pr.unit}`} type="number" placeholder="60" value={rate} onChange={e => setRate(e.target.value)} /></div>
            </div>
            <Input label="Notes (optional)" placeholder="Any remarks…" value={notes} onChange={e => setNotes(e.target.value)} />
            <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
              {[true, false].map(p => (
                <button key={p} onClick={() => setPaid(p)} style={{ flex: 1, padding: "11px", borderRadius: 12, fontFamily: "inherit", border: "2px solid", cursor: "pointer", fontSize: 13, fontWeight: 700, borderColor: paid === p ? (p ? "#3a7d44" : "#e53935") : "#dce4ef", background: paid === p ? (p ? "#f0fbf3" : "#fff0ee") : "#f8fbff", color: paid === p ? (p ? "#3a7d44" : "#e53935") : "#7a90aa" }}>{p ? "✅ Paid" : "📒 Credit"}</button>
              ))}
            </div>
            <Btn onClick={add} color={flash ? "#3a7d44" : pr.color}>{flash ? "✅ Entry Saved!" : "Save Entry"}</Btn>
          </Card>
          <SearchBar value={search} onChange={setSearch} placeholder="Search customer…" />
          {shown.map(e => <EntryCard key={e.id} e={e} type="sales" onDelete={del} onEdit={setEditEntry} onMarkPaid={markPaid} />)}
        </div>
      );
    }

    // ── REPORTS TAB ────────────────────────────────────────────────────
    function ReportsTab({ stockIn, sales, settings, setSettings }) {
      const [subTab, setSubTab] = useState("Summary");
      const [expName, setExpName] = useState("");
      const [expAmt, setExpAmt] = useState("");
      const [expenses, setExpenses] = useState([]);

      useEffect(() => { load("dairy-expenses").then(setExpenses); }, []);

      async function addExp() {
        if (!expName.trim() || !expAmt) return;
        const u = [{ id: Date.now(), date: todayStr(), name: expName.trim(), amt: parseFloat(expAmt) }, ...expenses];
        setExpenses(u); await save("dairy-expenses", u); setExpName(""); setExpAmt("");
      }

      async function updateThreshold(id, val) {
        const u = { ...settings, thresholds: { ...(settings?.thresholds || {}), [id]: parseFloat(val) || 0 } };
        setSettings(u); await save("dairy-settings", u);
      }

      const totalSales = sales.reduce((s, e) => s + e.qty * e.rate, 0);
      const totalCollected = sales.filter(e => e.paid).reduce((s, e) => s + e.qty * e.rate, 0);
      const totalDues = sales.filter(e => !e.paid).reduce((s, e) => s + e.qty * e.rate, 0);
      const totalExp = expenses.reduce((s, e) => s + e.amt, 0);

      return (
        <div>
          <div style={{ display: "flex", gap: 5, marginBottom: 14, overflowX: "auto" }}>
            {REPORT_TABS.map(t => (
              <button key={t} onClick={() => setSubTab(t)} style={{ padding: "7px 12px", borderRadius: 10, border: "none", background: subTab === t ? "#4a90d9" : "#e8f0fb", color: subTab === t ? "#fff" : "#4a90d9", fontWeight: 700, fontSize: 12, cursor: "pointer", fontFamily: "inherit" }}>{t}</button>
            ))}
          </div>

          {subTab === "Summary" && (
            <div>
              <Card><Lbl>Total TurnOver</Lbl><div style={{ fontSize: 24, fontWeight: 900 }}>{fmtCur(totalSales)}</div></Card>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                <Card style={{ margin: 0 }}><Lbl>Collected</Lbl><div style={{ fontSize: 18, fontWeight: 800, color: "#3a7d44" }}>{fmtCur(totalCollected)}</div></Card>
                <Card style={{ margin: 0 }}><Lbl>Expenses</Lbl><div style={{ fontSize: 18, fontWeight: 800, color: "#e53935" }}>{fmtCur(totalExp)}</div></Card>
              </div>
            </div>
          )}

          {subTab === "Customers" && (
            <Card>
              <SecTitle>Outstanding Statement</SecTitle>
              {Object.entries(sales.reduce((acc, e) => { acc[e.customer] = (acc[e.customer] || 0) + (e.paid ? 0 : e.qty * e.rate); return acc; }, {})).filter(([_, amt]) => amt > 0).map(([name, amt]) => (
                <div key={name} style={{ display: "flex", justifyOnContent: "space-between", padding: "8px 0", borderBottom: "1px solid #f0f4fa" }}>
                  <span style={{ fontWeight: 600 }}>{name}</span><span style={{ fontWeight: 800, color: "#e53935" }}>{fmtCur(amt)}</span>
                </div>
              ))}
            </Card>
          )}

          {subTab === "Expenses" && (
            <div>
              <Card>
                <Input label="Title" value={expName} onChange={e => setExpName(e.target.value)} />
                <Input label="Amount" type="number" value={expAmt} onChange={e => setExpAmt(e.target.value)} />
                <Btn onClick={addExp} color="#e53935">Add Expense</Btn>
              </Card>
              {expenses.map(exp => (
                <div key={exp.id} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0" }}>
                  <div>{exp.name}</div><div style={{ color: "#e53935" }}>-{fmtCur(exp.amt)}</div>
                </div>
              ))}
            </div>
          )}

          {subTab === "Settings" && (
            <Card>
              {PRODUCTS.map(p => (
                <div key={p.id} style={{ display: "flex", justifyContent: "space-between", marginBottom: 10 }}>
                  <span>{p.icon} {p.label}</span>
                  <input type="number" value={settings?.thresholds?.[p.id] ?? 5} onChange={e => updateThreshold(p.id, e.target.value)} style={{ width: 60, textAlign: "center" }} />
                </div>
              ))}
            </Card>
          )}
        </div>
      );
    }

    // ── MAIN APPLICATION BOOTSTRAPPER ───────────────────────────────────
    function App() {
      const [tab, setTab] = useState("home");
      const [stockIn, setStockIn] = useState([]);
      const [sales, setSales] = useState([]);
      const [dailyCustomers, setDailyCustomers] = useState([]);
      const [settings, setSettings] = useState({ thresholds: { milk: 5, dahi: 5, paneer: 5, mahi: 5 } });
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        async function init() {
          try {
            const [st, sl, dc, se] = await Promise.all([
              load("dairy-stock-in"),
              load("dairy-sales"),
              load("dairy-daily-customers"),
              load("dairy-settings", { thresholds: { milk: 5, dahi: 5, paneer: 5, mahi: 5 } })
            ]);
            setStockIn(st); setSales(sl); setDailyCustomers(dc); setSettings(se);
          } catch (e) { console.error(e); } finally { setLoading(false); }
        }
        init();
      }, []);

      if (loading) {
        return (
          <div style={{ display: "flex", height: "100vh", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 12 }}>
            <div style={{ fontSize: 40 }}>🥛</div>
            <div style={{ color: "#4a90d9", fontWeight: 700, fontSize: 14 }}>Connecting Database...</div>
          </div>
        );
      }

      const content = {
        home: <HomeTab stockIn={stockIn} sales={sales} settings={settings} />,
        quick: <QuickTab sales={sales} setSales={setSales} dailyCustomers={dailyCustomers} setDailyCustomers={setDailyCustomers} />,
        stockin: <StockInTab stockIn={stockIn} setStockIn={setStockIn} />,
        sales: <SalesTab sales={sales} setSales={setSales} />,
        reports: <ReportsTab stockIn={stockIn} sales={sales} settings={settings} setSettings={setSettings} />
      };

      return (
        <div style={{ width: "100%", minHeight: "100vh", paddingBottom: 75, boxSizing: "border-box" }}>
          <div style={{ background: "#fff", padding: "12px 16px", display: "flex", alignItems: "center", borderBottom: "1.5px solid #e0eaf8", position: "sticky", top: 0, zIndex: 100 }}>
            <div>
              <div style={{ fontSize: 16, fontWeight: 800, color: "#1a2a3a" }}>🥛 DairyManager <span style={{ fontSize: 10, background: "#e0f0ff", color: "#4a90d9", padding: "1px 6px", borderRadius: 6 }}>PRO</span></div>
            </div>
          </div>

          <div style={{ padding: "14px 13px" }}>{content[tab]}</div>

          <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "#fff", borderTop: "1.5px solid #e0eaf8", display: "flex", zIndex: 200, maxWidth: "480px", margin: "0 auto", boxShadow: "0 -4px 20px rgba(74,144,217,0.08)" }}>
            {TABS.map(t => (
              <button key={t.id} onClick={() => setTab(t.id)} style={{ flex: 1, padding: "9px 3px 7px", border: "none", background: tab === t.id ? "#f0f6ff" : "#fff", color: tab === t.id ? "#4a90d9" : "#9aafcc", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 2, fontFamily: "inherit" }}>
                <span style={{ fontSize: 20 }}>{t.icon}</span>
                <span style={{ fontSize: 10, fontWeight: 700 }}>{t.label}</span>
              </button>
            ))}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

</body>
</html>
