<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dairy Manager</title>

  <!-- 1. React aur Babel Loaders -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- 2. Firebase Libraries -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    
    // Inhe global window variables bana rahe hain taaki niche wale code ko direct mil sakein
    window.React = React;
    window.useState = React.useState;
    window.useEffect = React.useEffect;
    window.useRef = React.useRef;
    
    window.FirebaseApp = { initializeApp };
    window.FirebaseFirestore = { getFirestore, doc, setDoc, getDoc };
    window.firebaseIsReady = true;
  </script>

  <style>
    /* Default resets aur basic styling taaki app center me fluid dikhe */
    body {
      margin: 0;
      padding: 0;
      background-color: #f4f8ff;
      display: flex;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #root {
      width: 100%;
      max-width: 500px;
      min-height: 100vh;
      background: #fff;
      box-shadow: 0 0 20px rgba(0,0,0,0.05);
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <!-- 3. MAIN APPLICATION ENGINE (Yahan par aapka poora code chalega) -->
  <script type="text/babel">
    // Global Hooks Extract kar rahe hain
    const { useState, useEffect, useRef } = React;

    // Bootstrapper checking sequence
    function AppRunner() {
      const [dbReady, setDbReady] = useState(false);

      useEffect(() => {
        const checkFirebase = setInterval(() => {
          if (window.firebaseIsReady) {
            setDbReady(true);
            clearInterval(checkFirebase);
          }
        }, 50);
        return () => clearInterval(checkFirebase);
      }, []);

      if (!dbReady) {
        return (
          <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "#f4f8ff" }}>
            <div style={{ textAlign: "center", color: "#4a90d9", fontWeight: 600 }}>
              <div style={{ fontSize: "55px" }}>🥛</div>
              <div style={{ marginTop: "10px", fontSize: "15px" }}>Starting Ramu Dairy...</div>
            </div>
          </div>
        );
      }

      return <Dairy />;
    }

    // =========================================================================
    // TERA ORIGINAL CODE YAHAN SE SHURU HOTA HAI
    // =========================================================================
    
    // ── FIREBASE CONFIGURATION ──
    const firebaseConfig = {
      apiKey: "AIzaSyAxadt7Kl7pwzfgcEm6G98jvF3Ki-AB34o",
      authDomain: "dairy-manager-6d898.firebaseapp.com",
      projectId: "dairy-manager-6d898",
      storageBucket: "dairy-manager-6d898.firebasestorage.app",
      messagingSenderId: "651048776070",
      appId: "1:651048776070:web:0ca12c6bdff39e2f303c07"
    };

    // Firebase Core initializations string use karke global window reference se
    const app = window.FirebaseApp.initializeApp(firebaseConfig);
    const db = window.FirebaseFirestore.getFirestore(app);
    const { doc, setDoc, getDoc } = window.FirebaseFirestore;

    function Dairy() {
      // PASTE_YOUR_APP_JSX_CODE_HERE
      // Bhai, jo aapki 'App.jsx' file ka poora code hai, usme se shuruat ke imports ko chhodkar, 
      // 'function Dairy() {' ke andar ka jitna bhi logic, hooks, functions, return layout hai, 
      // usey yahan is function ke andar dhyan se paste kar do!
      
      return (
        <div style={{ padding: "20px", textAlign: "center" }}>
          <h2>Dairy Dashboard Loaded!</h2>
          <p>Bhai agar ye screen dikh rahi hai, matlab integration complete hai.</p>
        </div>
      );
    }

    // Final Rendering Trigger
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AppRunner />);
  </script>

</body>
</html>
