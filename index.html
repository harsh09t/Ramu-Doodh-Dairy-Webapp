<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dairy Manager</title>

  <!-- React aur Babel Loader -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase Modern Modules -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    
    // Inhe window par expose kar rahe hain
    window.React = React;
    window.useState = React.useState;
    window.useEffect = React.useEffect;
    
    window.FirebaseApp = { initializeApp };
    window.FirebaseFirestore = { getFirestore, doc, setDoc, getDoc };
    window.firebaseLoaded = true;
  </script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f4f8ff;
      display: flex;
      justify-content: center;
    }
    #root {
      width: 100%;
      max-width: 500px;
      min-height: 100vh;
      background: #fff;
      box-shadow: 0 0 20px rgba(0,0,0,0.05);
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <!-- Bootstrapping Script: Ye dhyan rakhega ki pehle Firebase mile, phir App load ho -->
  <script type="text/babel">
    function AppBootstrapper() {
      const [ready, setReady] = React.useState(false);
      const [error, setError] = React.useState(null);

      React.useEffect(() => {
        const checkGlobals = setInterval(() => {
          if (window.firebaseLoaded && window.DairyApp) {
            setReady(true);
            clearInterval(checkGlobals);
          }
        }, 100);

        // Max 5 seconds wait karega, nahi toh error dikhayega debug karne ke liye
        const timeout = setTimeout(() => {
          clearInterval(checkGlobals);
          if (!window.DairyApp) {
            setError("App.jsx load toh hua par 'DairyApp' component nahi mila. Ek baar check karo ki code ke end mein 'export default function DairyApp()' hi likha hai na?");
          }
        }, 5000);

        return () => { clearInterval(checkGlobals); clearTimeout(timeout); };
      }, []);

      if (error) {
        return (
          <div style={{ padding: "20px", color: "#e53935", fontFamily: "sans-serif", fontSize: "14px", lineHeight: "1.5" }}>
            <h3>⚠️ Configuration Alert</h3>
            <p>{error}</p>
          </div>
        );
      }

      if (!ready) {
        return (
          <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "#f4f8ff" }}>
            <div style={{ textAlign: "center", fontFamily: "Georgia,serif", color: "#7a90aa", fontWeight: 600 }}>
              <div style={{ fontSize: "48px" }}>🥛</div>
              <div>Starting Dairy...</div>
            </div>
          </div>
        );
      }

      // Jab sab ready ho jaye tab tera main app run hoga
      const TargetApp = window.DairyApp;
      return <TargetApp />;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AppBootstrapper />);
  </script>

  <!-- Yahan se tera original App.jsx load ho raha hai -->
  <script type="text/babel" src="App.jsx" data-plugins="transform-modules-umd"></script>

  <script type="text/babel">
    // Yeh line aapke exported component ko browser ke window ke sath bind kar degi
    if (typeof DairyApp !== 'undefined') {
      window.DairyApp = DairyApp;
    } else if (window.exports && window.exports.default) {
      window.DairyApp = window.exports.default;
    }
  </script>

</body>
</html>
