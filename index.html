<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dairy Manager</title>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    
    // Inhe global variables bana rahe hain taaki aapka code access kar sake
    window.React = React;
    window.useState = React.useState;
    window.useEffect = React.useEffect;
    window.useRef = React.useRef;
    
    window.FirebaseApp = { initializeApp };
    window.FirebaseFirestore = { getFirestore, doc, setDoc, getDoc };
    window.firebaseIsReady = true;
  </script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f4f8ff;
      display: flex;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    #root {
      width: 100%;
      max-width: 500px;
      min-height: 100vh;
      background: #fff;
      box-shadow: 0 0 20px rgba(0,0,0,0.05);
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    function AppRunner() {
      const [status, setStatus] = React.useState("loading");

      React.useEffect(() => {
        let attempts = 0;
        const checker = setInterval(() => {
          attempts++;
          
          // Hum check kar rahe hain ki kya aapka original component (Dairy) browser ko mil gaya hai
          const TargetComponent = window.Dairy || (typeof Dairy !== 'undefined' ? Dairy : null);

          if (window.firebaseIsReady && TargetComponent) {
            window.FinalRenderApp = TargetComponent;
            setStatus("ready");
            clearInterval(checker);
          }
          
          // Agar 8 seconds tak load nahi hua toh fallback dega
          if (attempts > 80) {
            clearInterval(checker);
            setStatus("error");
          }
        }, 100);

        return () => clearInterval(checker);
      }, []);

      if (status === "loading") {
        return (
          <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "#f4f8ff" }}>
            <div style={{ textAlign: "center", color: "#4a90d9", fontWeight: 600 }}>
              <div style={{ fontSize: "55px", animation: "bounce 1s infinite alternative" }}>🥛</div>
              <div style={{ marginTop: "10px", fontSize: "15px", letterSpacing: "0.5px" }}>Starting Ramu Dairy...</div>
            </div>
          </div>
        );
      }

      if (status === "error") {
        return (
          <div style={{ padding: "24px", color: "#e53935", fontSize: "14px", lineHeight: "1.6" }}>
            <h3 style={{ margin: "0 0 8px 0" }}>⚠️ Engine Optimization Needed</h3>
            <p>Bhai, files successfully load ho gayi hain par code setup static hosting par thoda sync nahi ho pa raha. Ek baar check karo ki 'App.jsx' ke end me 'export default function Dairy()' ya sirf function ka naam 'Dairy' hi hai na?</p>
          </div>
        );
      }

      const LiveApp = window.FinalRenderApp;
      return <LiveApp />;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AppRunner />);
  </script>

  <script type="text/babel" src="App.jsx" data-plugins="transform-modules-umd"></script>

  <script type="text/babel">
    setTimeout(() => {
      if (typeof Dairy !== 'undefined') { window.Dairy = Dairy; }
      else if (window.exports && window.exports.default) { window.Dairy = window.exports.default; }
      else if (window.exports && window.exports.Dairy) { window.Dairy = window.exports.Dairy; }
    }, 150);
  </script>

</body>
</html>
