const firebaseConfig={
  apiKey:"AIzaSyAxadt7Kl7pwzfgcEm6G98jvF3Ki-AB34o",
  authDomain:"dairy-manager-6d898.firebaseapp.com",
  projectId:"dairy-manager-6d898",
  storageBucket:"dairy-manager-6d898.firebasestorage.app",
  messagingSenderId:"651048776070",
  appId:"1:651048776070:web:0ca12c6bdff39e2f303c07"
};
const firebaseApp=firebase.initializeApp(firebaseConfig);
const db=firebase.firestore(firebaseApp);

async function load(key,def=[]){
  try{
    const snap=await db.collection("dairy").doc(key).get();
    return snap.exists?(snap.data().value??def):def;
  }catch(err){
    console.warn("Firebase load failed, fallback to localStorage:",err);
    try{const v=localStorage.getItem(key);return v?JSON.parse(v):def;}catch{return def;}
  }
}
async function save(key,data){
  try{await db.collection("dairy").doc(key).set({value:data});}
  catch(e){
    console.warn("Firebase save failed, fallback to localStorage:",e);
    try{localStorage.setItem(key,JSON.stringify(data));}catch{}
  }
}
</script>

<script>
const {useState,useEffect}=React;
const h=React.createElement;

// ── CONSTANTS ───────────────────────────────────────────────────────
const PRODUCTS=[
  {id:"milk",label:"Milk",icon:"🥛",unit:"L",color:"#4a90d9",bg:"#f0f6ff"},
  {id:"dahi",label:"Dahi",icon:"🥣",unit:"Kg",color:"#c47d3a",bg:"#fff8ee"},
  {id:"paneer",label:"Paneer",icon:"🧀",unit:"Kg",color:"#8e44ad",bg:"#f8f0ff"},
  {id:"mahi",label:"Mahi",icon:"🫙",unit:"L",color:"#3a7d44",bg:"#f0fbf3"},
];
const TABS=[
  {id:"home",label:"Home",icon:"🏠"},
  {id:"quick",label:"Quick",icon:"⚡"},
  {id:"stockin",label:"Stock In",icon:"⬇️"},
  {id:"sales",label:"Sales",icon:"🛒"},
  {id:"reports",label:"Reports",icon:"📊"},

const REPORT_TABS=["Summary","Customers","Expenses","Settings"];

const getP=id=>PRODUCTS.find(p=>p.id===id)||PRODUCTS[0];
const todayStr=()=>new Date().toISOString().split("T")[0];
const fmtDate=d=>new Date(d).toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"});
const fmtCur=n=>"₹"+parseFloat(n||0).toFixed(0);
const fmtQty=(q,u)=>`${parseFloat(q).toFixed(1)} ${u}`;
const monthOf=d=>d?.slice(0,7);
const nowMonth=()=>todayStr().slice(0,7);

// ── UI ATOMS ────────────────────────────────────────────────────────
const Lbl=({children})=>h("div",{style:{fontSize:11,color:"#6b7c93",fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:4}},children);

const Card=({children,style={}})=>h("div",{style:{background:"#fff",borderRadius:18,padding:"15px",marginBottom:12,boxShadow:"0 2px 16px rgba(74,144,217,0.07)",border:"1px solid #e8f0fb",...style}},children);

const SecTitle=({children,color="#4a90d9"})=>h("div",{style:{fontSize:13,fontWeight:800,color,marginBottom:12}},children);

const Input=({label,...props})=>h("div",{style:{marginBottom:12}},
  label&&h(Lbl,null,label),
  h("input",{...props,style:{width:"100%",boxSizing:"border-box",padding:"12px 14px",borderRadius:12,border:"1.5px solid #dce4ef",fontSize:15,background:"#f8fbff",color:"#1a2a3a",fontFamily:"inherit",outline:"none",...(props.style||{})}})
);

const Btn=({children,onClick,color="#4a90d9",style={},small})=>h("button",{onClick,style:{background:color,color:"#fff",border:"none",borderRadius:small?8:14,padding:small?"6px 12px":"14px",fontSize:small?12:15,fontWeight:700,cursor:"pointer",width:small?"auto":"100%",fontFamily:"inherit",...style}},children);

const StatBox=({icon,label,value,color,bg})=>h("div",{style:{background:bg,borderRadius:16,padding:"12px 8px",textAlign:"center",border:`1.5px solid ${color}22`}},
  h("div",{style:{fontSize:22}},icon),
  h("div",{style:{fontSize:16,fontWeight:800,color,marginTop:3}},value),
  h("div",{style:{fontSize:10,color:"#7a90aa",marginTop:2,fontWeight:600}},label)
);

const ProductPicker=({value,onChange})=>h("div",{style:{marginBottom:14}},
  h(Lbl,null,"Product"),
  h("div",{style:{display:"flex",gap:7}},
    PRODUCTS.map(p=>h("button",{key:p.id,onClick:()=>onChange(p.id),style:{flex:1,padding:"9px 4px",borderRadius:12,border:"2px solid",borderColor:value===p.id?p.color:"#dce4ef",background:value===p.id?p.bg:"#f8fbff",color:value===p.id?p.color:"#9aafcc",cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:10,display:"flex",flexDirection:"column",alignItems:"center",gap:2}},
      h("span",{style:{fontSize:20}},p.icon),h("span",null,p.label)
    ))
  )
);

const SearchBar=({value,onChange,placeholder="Search…"})=>h("div",{style:{position:"relative",marginBottom:12}},
  h("span",{style:{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:14,color:"#9aafcc"}},"🔍"),
  h("input",{value,onChange:e=>onChange(e.target.value),placeholder,style:{width:"100%",boxSizing:"border-box",padding:"10px 12px 10px 34px",borderRadius:12,border:"1.5px solid #dce4ef",fontSize:14,background:"#f8fbff",color:"#1a2a3a",fontFamily:"inherit",outline:"none"}}),
  value&&h("span",{onClick:()=>onChange(""),style:{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",cursor:"pointer",color:"#9aafcc",fontSize:16}},"✕")
);

// ── EDIT MODAL ───────────────────────────────────────────────────────
function EditModal({entry,type,onSave,onClose}){
  const p=getP(entry.product||"milk");
  const [form,setForm]=useState({...entry});
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  return h("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:500,display:"flex",alignItems:"flex-end"}},
    h("div",{style:{background:"#fff",borderRadius:"24px 24px 0 0",padding:"20px 16px 32px",width:"100%",maxHeight:"90vh",overflowY:"auto",boxSizing:"border-box"}},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}},
        h("div",{style:{fontSize:16,fontWeight:800,color:"#1a2a3a"}},"✏️ Edit Entry"),
        h("button",{onClick:onClose,style:{background:"#f0f4fa",border:"none",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:16}},"✕")
      ),
      h(Input,{label:"Date",type:"date",value:form.date,onChange:e=>set("date",e.target.value)}),
      h(Input,{label:type==="stockin"?"Supplier":"Customer",value:form[type==="stockin"?"supplier":"customer"]||"",onChange:e=>set(type==="stockin"?"supplier":"customer",e.target.value)}),
      h("div",{style:{display:"flex",gap:10}},
        h("div",{style:{flex:1}},h(Input,{label:`Qty (${p.unit})`,type:"number",value:form.qty,onChange:e=>set("qty",parseFloat(e.target.value)||0)})),
        h("div",{style:{flex:1}},h(Input,{label:`Rate ₹/${p.unit}`,type:"number",value:form.rate,onChange:e=>set("rate",parseFloat(e.target.value)||0)}))
      ),
      h(Input,{label:"Notes (optional)",placeholder:"Any remarks…",value:form.notes||"",onChange:e=>set("notes",e.target.value)}),
      h(Btn,{onClick:()=>onSave(form),color:"#4a90d9"},"Save Changes")
    )
  );
}

// ── QUICK TAB ───────────────────────────────────────────────────────
function QuickTab({sales,setSales,dailyCustomers,setDailyCustomers}){
  const [activeCard,setActiveCard]=useState(null);
  const [qty,setQty]=useState("");
  const [paid,setPaid]=useState(true);
  const [flash,setFlash]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [newName,setNewName]=useState("");
  const [newProduct,setNewProduct]=useState("milk");
  const [newRate,setNewRate]=useState("");
  const [newPaidDefault,setNewPaidDefault]=useState(true);

  async function saveDC(updated){setDailyCustomers(updated);await save("dairy-daily-customers",updated);}
  async function addDailyCustomer(){
    if(!newName.trim()||!newRate)return;
    await saveDC([...dailyCustomers,{name:newName.trim(),product:newProduct,rate:parseFloat(newRate),paidDefault:newPaidDefault}]);
    setNewName("");setNewRate("");setShowAdd(false);
  }
  async function removeCustomer(idx){
    await saveDC(dailyCustomers.filter((_,i)=>i!==idx));
    if(activeCard===idx)setActiveCard(null);
  }
  async function submitQuickSale(){
    if(activeCard===null||!qty)return;
    const c=dailyCustomers[activeCard];
    const en={id:Date.now(),product:c.product,date:todayStr(),customer:c.name,qty:parseFloat(qty),rate:c.rate,paid,notes:""};
    const u=[en,...sales];setSales(u);await save("dairy-sales",u);
    setFlash(activeCard);setQty("");setActiveCard(null);
    setTimeout(()=>setFlash(null),2000);
  }

  const todaySales=sales.filter(x=>x.date===todayStr());
  const todayRev=todaySales.filter(x=>x.paid).reduce((s,x)=>s+x.qty*x.rate,0);

  const customerButtons=dailyCustomers.map((c,idx)=>{
    const pp=getP(c.product);
    const isActive=activeCard===idx;
    const didFlash=flash===idx;
    const alreadyDone=todaySales.some(x=>x.customer===c.name&&x.product===c.product);
    return h("button",{
      key:idx,
      onClick:()=>{setActiveCard(isActive?null:idx);setQty("");setPaid(c.paidDefault??true);},
      style:{background:didFlash?"#f0fbf3":isActive?pp.bg:"#fff",borderRadius:16,padding:"14px 10px",border:`2px solid ${didFlash?"#3a7d44":isActive?pp.color:"#e8f0fb"}`,cursor:"pointer",fontFamily:"inherit",textAlign:"center",position:"relative",boxShadow:isActive?"0 4px 20px rgba(74,144,217,0.15)":"0 2px 8px rgba(0,0,0,0.05)"}
    },
      alreadyDone&&h("div",{style:{position:"absolute",top:6,right:8,fontSize:12}},"✅"),
      h("button",{onClick:ev=>{ev.stopPropagation();removeCustomer(idx);},style:{position:"absolute",top:5,left:7,background:"#fff0ee",border:"none",borderRadius:6,padding:"2px 5px",cursor:"pointer",fontSize:11,color:"#e53935"}},"✕"),
      h("div",{style:{fontSize:26,marginTop:4}},pp.icon),
      h("div",{style:{fontSize:13,fontWeight:800,color:"#1a2a3a",marginTop:4}},c.name),
      h("div",{style:{fontSize:11,color:pp.color,fontWeight:700,marginTop:2}},`${pp.label} · ${fmtCur(c.rate)}/${pp.unit}`),
      didFlash&&h("div",{style:{fontSize:11,color:"#3a7d44",fontWeight:700,marginTop:3}},"✓ Saved!")
    );
  });

  let activePanel=null;
  if(activeCard!==null&&dailyCustomers[activeCard]){
    const c=dailyCustomers[activeCard];
    const pp=getP(c.product);
    activePanel=h(Card,{style:{border:`2px solid ${pp.color}`,marginBottom:16}},
      h("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:14}},
        h("span",{style:{fontSize:28}},pp.icon),
        h("div",null,
          h("div",{style:{fontSize:16,fontWeight:800,color:"#1a2a3a"}},c.name),
          h("div",{style:{fontSize:12,color:pp.color,fontWeight:600}},`${pp.label} · ${fmtCur(c.rate)}/${pp.unit}`)
        )
      ),
      h(Input,{label:`Quantity (${pp.unit})`,type:"number",placeholder:`How much ${pp.label}?`,value:qty,onChange:ev=>setQty(ev.target.value),style:{fontSize:20,fontWeight:700,textAlign:"center"}}),
      (qty&&!isNaN(qty))&&h("div",{style:{background:pp.bg,borderRadius:12,padding:"10px",marginBottom:12,textAlign:"center",border:`1px dashed ${pp.color}`}},
        h("span",{style:{fontSize:13,color:"#5a6a7a"}},"Total: "),
        h("span",{style:{fontSize:22,fontWeight:900,color:pp.color}},fmtCur(parseFloat(qty)*c.rate))
      ),
      h(Lbl,null,"Payment"),
      h("div",{style:{display:"flex",gap:8,marginBottom:14}},
        [true,false].map(p=>h("button",{key:String(p),onClick:()=>setPaid(p),style:{flex:1,padding:"10px",borderRadius:12,fontFamily:"inherit",border:"2px solid",cursor:"pointer",fontSize:13,fontWeight:700,borderColor:paid===p?(p?"#3a7d44":"#e53935"):"#dce4ef",background:paid===p?(p?"#f0fbf3":"#fff0ee"):"#f8fbff",color:paid===p?(p?"#3a7d44":"#e53935"):"#7a90aa"}},p?"✅ Paid":"📒 Credit"))
      ),
      h(Btn,{onClick:submitQuickSale,color:pp.color},"⚡ Save Entry")
    );
  }

  const todayEntriesCard=todaySales.length>0?h(Card,null,
    h(SecTitle,null,"📋 Today's Entries"),
    [...todaySales].sort((a,b)=>b.id-a.id).map(x=>{
      const pp=getP(x.product);
      return h("div",{key:x.id,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #f0f4fa"}},
        h("div",null,
          h("div",{style:{fontSize:13,fontWeight:700,color:"#1a2a3a"}},`${pp.icon} ${x.customer}`),
          h("div",{style:{fontSize:11,color:"#7a90aa"}},`${fmtQty(x.qty,pp.unit)} @ ${fmtCur(x.rate)}/${pp.unit}`)
        ),
        h("div",{style:{textAlign:"right"}},
          h("div",{style:{fontSize:14,fontWeight:800,color:x.paid?"#3a7d44":"#e53935"}},fmtCur(x.qty*x.rate)),
          h("div",{style:{fontSize:10,color:x.paid?"#3a7d44":"#e53935"}},x.paid?"✓ Paid":"Due")
        )
      );
    })
  ):null;

  const addSection=!showAdd?h("button",{onClick:()=>setShowAdd(true),style:{width:"100%",padding:"14px",borderRadius:14,border:"2px dashed #4a90d9",background:"#f0f6ff",color:"#4a90d9",fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"inherit"}},"+ Add Daily Customer")
    :h(Card,{style:{border:"2px solid #4a90d9"}},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
        h(SecTitle,null,"➕ New Daily Customer"),
        h("button",{onClick:()=>setShowAdd(false),style:{background:"#f0f4fa",border:"none",borderRadius:8,padding:"5px 9px",cursor:"pointer",fontSize:14}},"✕")
      ),
      h(Input,{label:"Customer Name",placeholder:"e.g. Ramesh...",value:newName,onChange:ev=>setNewName(ev.target.value)}),
      h(ProductPicker,{value:newProduct,onChange:setNewProduct}),
      h(Input,{label:`Default Rate ₹/${getP(newProduct).unit}`,type:"number",placeholder:"60",value:newRate,onChange:ev=>setNewRate(ev.target.value)}),
      h(Lbl,null,"Default Payment"),
      h("div",{style:{display:"flex",gap:8,marginBottom:14}},
        [true,false].map(p=>h("button",{key:String(p),onClick:()=>setNewPaidDefault(p),style:{flex:1,padding:"10px",borderRadius:12,fontFamily:"inherit",border:"2px solid",cursor:"pointer",fontSize:13,fontWeight:700,borderColor:newPaidDefault===p?(p?"#3a7d44":"#e53935"):"#dce4ef",background:newPaidDefault===p?(p?"#f0fbf3":"#fff0ee"):"#f8fbff",color:newPaidDefault===p?(p?"#3a7d44":"#e53935"):"#7a90aa"}},p?"✅ Paid":"📒 Credit"))
      ),
      h(Btn,{onClick:addDailyCustomer,color:"#4a90d9"},"Save Customer")
    );

  return h("div",null,
    h("div",{style:{background:"linear-gradient(135deg,#4a90d9,#357abd)",borderRadius:18,padding:"14px 18px",marginBottom:16,color:"#fff",display:"flex",justifyContent:"space-between",alignItems:"center"}},
      h("div",null,h("div",{style:{fontSize:13,opacity:0.85}},"Today's Sales"),h("div",{style:{fontSize:24,fontWeight:900,marginTop:2}},fmtCur(todayRev))),
      h("div",{style:{textAlign:"right"}},h("div",{style:{fontSize:13,opacity:0.85}},"Entries"),h("div",{style:{fontSize:24,fontWeight:900}},todaySales.length))
    ),
    h(SecTitle,null,"⚡ Daily Customers — One Tap Entry"),
    (dailyCustomers.length===0&&!showAdd)?h(Card,{style:{textAlign:"center",padding:28}},
      h("div",{style:{fontSize:36}},"👥"),
      h("div",{style:{fontWeight:700,fontSize:15,color:"#4a90d9",marginTop:8}},"No daily customers yet!"),
      h("div",{style:{color:"#7a90aa",fontSize:13,marginTop:4}},"Add your regular customers below.")
    ):null,
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}},customerButtons),
    activePanel,
    todayEntriesCard,
    addSection
  );
}

// ── HOME TAB ────────────────────────────────────────────────────────
function HomeTab({stockIn,sales,settings}){
  const t=todayStr();
  const todayIn=stockIn.filter(x=>x.date===t).reduce((s,x)=>s+x.qty,0);
  const todaySold=sales.filter(x=>x.date===t).reduce((s,x)=>s+x.qty,0);
  const todayRev=sales.filter(x=>x.date===t&&x.paid).reduce((s,x)=>s+x.qty*x.rate,0);
  const totalDues=sales.filter(x=>!x.paid).reduce((s,x)=>s+x.qty*x.rate,0);
  const totalEarned=sales.filter(x=>x.paid).reduce((s,x)=>s+x.qty*x.rate,0);

  const stockMap={};
  PRODUCTS.forEach(p=>{stockMap[p.id]=0;});
  stockIn.forEach(x=>{stockMap[x.product]=(stockMap[x.product]||0)+x.qty;});
  sales.forEach(x=>{stockMap[x.product]=(stockMap[x.product]||0)-x.qty;});

  const duesMap={};
  sales.filter(x=>!x.paid).forEach(x=>{duesMap[x.customer]=(duesMap[x.customer]||0)+x.qty*x.rate;});
  const topDues=Object.entries(duesMap).sort((a,b)=>b[1]-a[1]).slice(0,3);
  const recent=[...sales].sort((a,b)=>b.id-a.id).slice(0,4);

  function shareWhatsApp(){
    const lowStock=PRODUCTS.filter(p=>(stockMap[p.id]||0)<(settings?.thresholds?.[p.id]??5));
    const lines=[`🥛 *Dairy Report — ${fmtDate(t)}*`,``,`📥 Received: ${todayIn.toFixed(1)}L`,`🛒 Sold: ${todaySold.toFixed(1)}L`,`💰 Earnings: ${fmtCur(todayRev)}`,`📦 Total Earned: ${fmtCur(totalEarned)}`,`📒 Pending Dues: ${fmtCur(totalDues)}`];
    if(lowStock.length)lines.push(``,`⚠️ Low Stock: `+lowStock.map(p=>`${p.icon}${p.label}`).join(", "));
    if(topDues.length){lines.push(``,"📒 Top Dues:");topDues.forEach(([n,a])=>lines.push(`  • ${n}: ${fmtCur(a)}`));}
    window.open(`https://wa.me/?text=${encodeURIComponent(lines.join("\n"))}`,"_blank");
  }

  return h("div",null,
    h("div",{style:{background:"linear-gradient(135deg,#4a90d9,#357abd)",borderRadius:20,padding:"18px 20px",marginBottom:16,color:"#fff",display:"flex",justifyContent:"space-between",alignItems:"center"}},
      h("div",null,h("div",{style:{fontSize:22,fontWeight:900}},"Good Day! 👋"),h("div",{style:{fontSize:13,opacity:0.85,marginTop:2}},fmtDate(t))),

        h("span",{style:{fontSize:20}},"📤"),h("span",null,"Share")

      h(StatBox,{icon:"🛒",label:"Sold",value:`${todaySold.toFixed(1)}L`,color:"#c47d3a",bg:"#fff8ee"}),
      h(StatBox,{icon:"💰",label:"Today's Earnings",value:fmtCur(todayRev),color:"#4a90d9",bg:"#f0f6ff"}),
      h(StatBox,{icon:"📒",label:"Total Dues",value:fmtCur(totalDues),color:"#e53935",bg:"#fff0ee"})
    ),
    h(Lbl,null,"Current Stock"),
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}},
      PRODUCTS.map(p=>{
        const net=stockMap[p.id]||0;
        const low=net<(settings?.thresholds?.[p.id]??5);
        return h(StatBox,{key:p.id,icon:p.icon,label:p.label,value:`${net.toFixed(1)} ${p.unit}`,color:low?"#e53935":p.color,bg:low?"#fff0ee":p.bg});
      })
    ),
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}},
      h(Card,{style:{margin:0,textAlign:"center"}},h(Lbl,null,"Total Earned"),h("div",{style:{fontSize:20,fontWeight:900,color:"#3a7d44"}},fmtCur(totalEarned))),
      h(Card,{style:{margin:0,textAlign:"center"}},h(Lbl,null,"This Month"),h("div",{style:{fontSize:20,fontWeight:900,color:"#4a90d9"}},fmtCur(sales.filter(x=>x.paid&&monthOf(x.date)===nowMonth()).reduce((s,x)=>s+x.qty*x.rate,0))))
    ),
    topDues.length>0&&h(Card,{style:{border:"1.5px solid #ffd0cc"}},
      h(SecTitle,{color:"#e53935"},"⏰ Pending Dues"),
      topDues.map(([name,amt])=>h("div",{key:name,style:{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid #fef0ee"}},

        h("span",{style:{fontSize:14,fontWeight:800,color:"#e53935"}},fmtCur(amt))
      ))
    ),
    recent.length>0&&h(Card,null,

      recent.map(x=>{

          h("div",null,h("div",{style:{fontSize:13,fontWeight:700,color:"#1a2a3a"}},`${pr.icon} ${x.customer}`),h("div",{style:{fontSize:11,color:"#7a90aa"}},`${fmtDate(x.date)} · ${fmtQty(x.qty,pr.unit)}`)),
          h("div",{style:{textAlign:"right"}},h("div",{style:{fontSize:13,fontWeight:800,color:x.paid?"#3a7d44":"#e53935"}},fmtCur(x.qty*x.rate)),h("div",{style:{fontSize:10,color:x.paid?"#3a7d44":"#e53935"}},x.paid?"✓ Paid":"Due"))
        );
      })

  );
}

// ── STOCK IN TAB ────────────────────────────────────────────────────
function StockInTab({stockIn,setStockIn}){
  const [product,setProduct]=useState("milk");
  const [date,setDate]=useState(todayStr());
  const [supplier,setSupplier]=useState("");
  const [qty,setQty]=useState("");
  const [rate,setRate]=useState("");
  const [notes,setNotes]=useState("");
  const [flash,setFlash]=useState(false);
  const [search,setSearch]=useState("");
  const [filterP,setFilterP]=useState("all");
  const [editEntry,setEditEntry]=useState(null);
  const pr=getP(product);

  async function add(){
    if(!supplier.trim()||!qty)return;
    const en={id:Date.now(),product,date,supplier:supplier.trim(),qty:parseFloat(qty),rate:parseFloat(rate)||0,notes:notes.trim()};
    const u=[en,...stockIn];setStockIn(u);await save("dairy-stock-in",u);
    setSupplier("");setQty("");setRate("");setNotes("");
    setFlash(true);setTimeout(()=>setFlash(false),1600);
  }
  async function del(id){const u=stockIn.filter(x=>x.id!==id);setStockIn(u);await save("dairy-stock-in",u);}
  async function saveEdit(updated){const u=stockIn.map(x=>x.id===updated.id?updated:x);setStockIn(u);await save("dairy-stock-in",u);setEditEntry(null);}

  const shown=[...stockIn].sort((a,b)=>b.id-a.id).filter(x=>(filterP==="all"||x.product===filterP)&&(!search||(x.supplier||"").toLowerCase().includes(search.toLowerCase())));

  return h("div",null,
    editEntry&&h(EditModal,{entry:editEntry,type:"stockin",onSave:saveEdit,onClose:()=>setEditEntry(null)}),
    h(Card,null,
      h(SecTitle,null,"⬇️ Add Stock Received"),
      h(ProductPicker,{value:product,onChange:setProduct}),
      h(Input,{label:"Date",type:"date",value:date,onChange:ev=>setDate(ev.target.value)}),
      h(Input,{label:"Supplier Name",placeholder:"e.g. Ramu Dairy…",value:supplier,onChange:ev=>setSupplier(ev.target.value)}),
      h("div",{style:{display:"flex",gap:10}},
        h("div",{style:{flex:1}},h(Input,{label:`Qty (${pr.unit})`,type:"number",placeholder:"40",value:qty,onChange:ev=>setQty(ev.target.value)})),
        h("div",{style:{flex:1}},h(Input,{label:`Rate ₹/${pr.unit}`,type:"number",placeholder:"50",value:rate,onChange:ev=>setRate(ev.target.value)}))
      ),
      h(Input,{label:"Notes (optional)",placeholder:"Any remarks…",value:notes,onChange:ev=>setNotes(ev.target.value)}),
      h(Btn,{onClick:add,color:flash?"#3a7d44":pr.color},flash?"✅ Entry Saved!":"Save Entry")
    ),
    h(SearchBar,{value:search,onChange:setSearch,placeholder:"Search supplier…"}),
    shown.map(x=>h(EntryCard,{key:x.id,e:x,type:"stockin",onDelete:del,onEdit:setEditEntry,onMarkPaid:()=>{}}))
  );
}

// ── SALES TAB ───────────────────────────────────────────────────────
function SalesTab({sales,setSales}){
  const [product,setProduct]=useState("milk");
  const [date,setDate]=useState(todayStr());
  const [customer,setCustomer]=useState("");
  const [qty,setQty]=useState("");
  const [rate,setRate]=useState("");
  const [notes,setNotes]=useState("");
  const [paid,setPaid]=useState(true);
  const [flash,setFlash]=useState(false);
  const [search,setSearch]=useState("");
  const [filterP,setFilterP]=useState("all");
  const [editEntry,setEditEntry]=useState(null);
  const pr=getP(product);

  async function add(){
    if(!customer.trim()||!qty)return;
    const en={id:Date.now(),product,date,customer:customer.trim(),qty:parseFloat(qty),rate:parseFloat(rate)||0,paid,notes:notes.trim()};
    const u=[en,...sales];setSales(u);await save("dairy-sales",u);
    setCustomer("");setQty("");setRate("");setNotes("");
    setFlash(true);setTimeout(()=>setFlash(false),1600);
  }
  async function del(id){const u=sales.filter(x=>x.id!==id);setSales(u);await save("dairy-sales",u);}
  async function saveEdit(updated){const u=sales.map(x=>x.id===updated.id?updated:x);setSales(u);await save("dairy-sales",u);setEditEntry(null);}
  async function markPaid(id){const u=sales.map(x=>x.id===id?{...x,paid:true}:x);setSales(u);await save("dairy-sales",u);}

  const shown=[...sales].sort((a,b)=>b.id-a.id).filter(x=>(filterP==="all"||x.product===filterP)&&(!search||(x.customer||"").toLowerCase().includes(search.toLowerCase())));

  return h("div",null,
    editEntry&&h(EditModal,{entry:editEntry,type:"sales",onSave:saveEdit,onClose:()=>setEditEntry(null)}),
    h(Card,null,
      h(SecTitle,null,"🛒 Add Casual Sale"),
      h(ProductPicker,{value:product,onChange:setProduct}),
      h(Input,{label:"Date",type:"date",value:date,onChange:ev=>setDate(ev.target.value)}),
      h(Input,{label:"Customer Name",placeholder:"Walk-in Customer...",value:customer,onChange:ev=>setCustomer(ev.target.value)}),
      h("div",{style:{display:"flex",gap:10}},
        h("div",{style:{flex:1}},h(Input,{label:`Qty (${pr.unit})`,type:"number",placeholder:"2",value:qty,onChange:ev=>setQty(ev.target.value)})),
        h("div",{style:{flex:1}},h(Input,{label:`Rate ₹/${pr.unit}`,type:"number",placeholder:"60",value:rate,onChange:ev=>setRate(ev.target.value)}))
      ),
      h(Input,{label:"Notes (optional)",placeholder:"Any remarks…",value:notes,onChange:ev=>setNotes(ev.target.value)}),
      h("div",{style:{display:"flex",gap:8,marginBottom:14}},
        [true,false].map(p=>h("button",{key:String(p),onClick:()=>setPaid(p),style:{flex:1,padding:"11px",borderRadius:12,fontFamily:"inherit",border:"2px solid",cursor:"pointer",fontSize:13,fontWeight:700,borderColor:paid===p?(p?"#3a7d44":"#e53935"):"#dce4ef",background:paid===p?(p?"#f0fbf3":"#fff0ee"):"#f8fbff",color:paid===p?(p?"#3a7d44":"#e53935"):"#7a90aa"}},p?"✅ Paid":"📒 Credit"))
      ),
      h(Btn,{onClick:add,color:flash?"#3a7d44":pr.color},flash?"✅ Entry Saved!":"Save Entry")
    ),
    h(SearchBar,{value:search,onChange:setSearch,placeholder:"Search customer…"}),
    shown.map(x=>h(EntryCard,{key:x.id,e:x,type:"sales",onDelete:del,onEdit:setEditEntry,onMarkPaid:markPaid}))
  );
}

// ── REPORTS TAB ─────────────────────────────────────────────────────
function ReportsTab({stockIn,sales,settings,setSettings}){
  const [subTab,setSubTab]=useState("Summary");
  const [expName,setExpName]=useState("");
  const [expAmt,setExpAmt]=useState("");
  const [expenses,setExpenses]=useState([]);
  useEffect(()=>{load("dairy-expenses",[]).then(setExpenses);},[]);

  async function addExp(){
    if(!expName.trim()||!expAmt)return;
    const u=[{id:Date.now(),date:todayStr(),name:expName.trim(),amt:parseFloat(expAmt)},...expenses];
    setExpenses(u);await save("dairy-expenses",u);setExpName("");setExpAmt("");
  }
  async function updateThreshold(id,val){
    const u={...settings,thresholds:{...(settings?.thresholds||{}),[id]:parseFloat(val)||0}};
    setSettings(u);await save("dairy-settings",u);
  }

  const totalSales=sales.reduce((s,x)=>s+x.qty*x.rate,0);
  const totalCollected=sales.filter(x=>x.paid).reduce((s,x)=>s+x.qty*x.rate,0);
  const totalExp=expenses.reduce((s,x)=>s+x.amt,0);

  let body=null;
  if(subTab==="Summary"){
    body=h("div",null,
      h(Card,null,h(Lbl,null,"Total TurnOver"),h("div",{style:{fontSize:24,fontWeight:900}},fmtCur(totalSales))),
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
        h(Card,{style:{margin:0}},h(Lbl,null,"Collected"),h("div",{style:{fontSize:18,fontWeight:800,color:"#3a7d44"}},fmtCur(totalCollected))),
        h(Card,{style:{margin:0}},h(Lbl,null,"Expenses"),h("div",{style:{fontSize:18,fontWeight:800,color:"#e53935"}},fmtCur(totalExp)))
      )
    );
  }else if(subTab==="Customers"){
    const duesObj=sales.reduce((acc,x)=>{acc[x.customer]=(acc[x.customer]||0)+(x.paid?0:x.qty*x.rate);return acc;},{});
    const entries=Object.entries(duesObj).filter(([_,amt])=>amt>0);
    body=h(Card,null,
      h(SecTitle,null,"Outstanding Statement"),
      entries.map(([name,amt])=>h("div",{key:name,style:{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #f0f4fa"}},
        h("span",{style:{fontWeight:600}},name),h("span",{style:{fontWeight:800,color:"#e53935"}},fmtCur(amt))
      ))
    );
  }else if(subTab==="Expenses"){
    body=h("div",null,
      h(Card,null,
        h(Input,{label:"Title",value:expName,onChange:ev=>setExpName(ev.target.value)}),
        h(Input,{label:"Amount",type:"number",value:expAmt,onChange:ev=>setExpAmt(ev.target.value)}),
        h(Btn,{onClick:addExp,color:"#e53935"},"Add Expense")
      ),
      expenses.map(exp=>h("div",{key:exp.id,style:{display:"flex",justifyContent:"space-between",padding:"8px 0"}},
        h("div",null,exp.name),h("div",{style:{color:"#e53935"}},`-${fmtCur(exp.amt)}`)
      ))
    );
  }else if(subTab==="Settings"){
    body=h(Card,null,
      PRODUCTS.map(p=>h("div",{key:p.id,style:{display:"flex",justifyContent:"space-between",marginBottom:10}},
        h("span",null,`${p.icon} ${p.label}`),
        h("input",{type:"number",value:settings?.thresholds?.[p.id]??5,onChange:ev=>updateThreshold(p.id,ev.target.value),style:{width:60,textAlign:"center"}})
      ))
    );
  }

  return h("div",null,
    h("div",{style:{display:"flex",gap:5,marginBottom:14,overflowX:"auto"}},
      REPORT_TABS.map(t=>h("button",{key:t,onClick:()=>setSubTab(t),style:{padding:"7px 12px",borderRadius:10,border:"none",background:subTab===t?"#4a90d9":"#e8f0fb",color:subTab===t?"#fff":"#4a90d9",fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"inherit"}},t))
    ),
    body
  );
}

// ── MAIN APP ────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState("home");
  const [stockIn,setStockIn]=useState([]);
  const [sales,setSales]=useState([]);
  const [dailyCustomers,setDailyCustomers]=useState([]);
  const [settings,setSettings]=useState({thresholds:{milk:5,dahi:5,paneer:5,mahi:5}});
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    async function init(){
      try{
        const [st,sl,dc,se]=await Promise.all([
          load("dairy-stock-in",[]),
          load("dairy-sales",[]),
          load("dairy-daily-customers",[]),
          load("dairy-settings",{thresholds:{milk:5,dahi:5,paneer:5,mahi:5}})
        ]);
        setStockIn(st);setSales(sl);setDailyCustomers(dc);setSettings(se);
      }catch(err){console.error(err);}
      finally{
        setLoading(false);
        document.getElementById("loading").style.display="none";
        document.getElementById("root").style.display="block";
      }
    }
    init();
  },[]);

  if(loading)return null;

  const content={
    home:h(HomeTab,{stockIn,sales,settings}),
    quick:h(QuickTab,{sales,setSales,dailyCustomers,setDailyCustomers}),
    stockin:h(StockInTab,{stockIn,setStockIn}),
    sales:h(SalesTab,{sales,setSales}),
    reports:h(ReportsTab,{stockIn,sales,settings,setSettings})
  };

  return h("div",{style:{width:"100%",minHeight:"100vh",paddingBottom:75,boxSizing:"border-box"}},
    h("div",{style:{background:"#fff",padding:"12px 16px",display:"flex",alignItems:"center",borderBottom:"1.5px solid #e0eaf8",position:"sticky",top:0,zIndex:100}},
      h("div",null,
        h("div",{style:{fontSize:16,fontWeight:800,color:"#1a2a3a"}},
          "🥛 DairyManager ",
          h("span",{style:{fontSize:10,background:"#e0f0ff",color:"#4a90d9",padding:"1px 6px",borderRadius:6}},"PRO")
        )
      )
    ),
    h("div",{style:{padding:"14px 13px"}},content[tab]),
    h("div",{style:{position:"fixed",bottom:0,left:0,right:0,background:"#fff",borderTop:"1.5px solid #e0eaf8",display:"flex",zIndex:200,maxWidth:"480px",margin:"0 auto",boxShadow:"0 -4px 20px rgba(74,144,217,0.08)"}},
      TABS.map(t=>h("button",{key:t.id,onClick:()=>setTab(t.id),style:{flex:1,padding:"9px 3px 7px",border:"none",background:tab===t.id?"#f0f6ff":"#fff",color:tab===t.id?"#4a90d9":"#9aafcc",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,fontFamily:"inherit"}},
        h("span",{style:{fontSize:20}},t.icon),
        h("span",{style:{fontSize:10,fontWeight:700}},t.label)
      ))
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App,null));
</script>
</body>
