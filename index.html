<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#2563eb"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>Dairy Manager 🥛</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f1f5f9;}
    input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
  </style>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>

<script>
  // ── Firebase Init (ONCE) ─────────────────────────────────────────
  const firebaseConfig = {
    apiKey: "AIzaSyAxadt7Kl7pwzfgcEm6G98jvF3Ki-AB34o",
    authDomain: "dairy-manager-6d898.firebaseapp.com",
    projectId: "dairy-manager-6d898",
    storageBucket: "dairy-manager-6d898.firebasestorage.app",
    messagingSenderId: "651048776070",
    appId: "1:651048776070:web:0ca12c6bdff39e2f303c07"
  };
  const app = firebase.initializeApp(firebaseConfig);
  const db  = firebase.firestore(app);

  async function load(key, def = []) {
    try {
      const snap = await db.collection("dairy").doc(key).get();
      return snap.exists ? (snap.data().value ?? def) : def;
    } catch { return def; }
  }
  async function save(key, data) {
    try { await db.collection("dairy").doc(key).set({ value: data }); }
    catch(e) { console.error("Save error:", e); }
  }
</script>

<script type="text/babel">
const { useState, useEffect } = React;

// ── CONSTANTS ────────────────────────────────────────────────────────
const PRODUCTS = [
  { id:"milk",   label:"Milk",   icon:"🥛", unit:"L",  color:"#2563eb", bg:"#eff6ff" },
  { id:"dahi",   label:"Dahi",   icon:"🥣", unit:"Kg", color:"#b45309", bg:"#fffbeb" },
  { id:"paneer", label:"Paneer", icon:"🧀", unit:"Kg", color:"#7c3aed", bg:"#f5f3ff" },
  { id:"mahi",   label:"Mahi",   icon:"🫙", unit:"L",  color:"#059669", bg:"#ecfdf5" },
];
const TABS = [
  { id:"home",    label:"Home",    icon:"🏠" },
  { id:"stockin", label:"Stock",   icon:"⬇️" },
  { id:"sales",   label:"Sales",   icon:"🛒" },
  { id:"dues",    label:"Dues",    icon:"📒" },
  { id:"reports", label:"Reports", icon:"📊" },
];

const getP     = id => PRODUCTS.find(p=>p.id===id)||PRODUCTS[0];
const today    = () => new Date().toISOString().split("T")[0];
const fmtDate  = d  => new Date(d+"T00:00:00").toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"});
const fmtCur   = n  => "₹"+parseFloat(n||0).toFixed(0);
const fmtQty   = (q,u) => `${parseFloat(q).toFixed(1)} ${u}`;
const monthOf  = d  => d?.slice(0,7);
const nowMonth = () => today().slice(0,7);

// ── UI ATOMS ─────────────────────────────────────────────────────────
function Lbl({children}){
  return <div style={{fontSize:10,color:"#64748b",fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:5}}>{children}</div>;
}
function Card({children,style={}}){
  return <div style={{background:"#fff",borderRadius:16,padding:14,marginBottom:10,boxShadow:"0 2px 12px rgba(0,0,0,0.06)",border:"1px solid #f1f5f9",...style}}>{children}</div>;
}
function SecTitle({children,color="#2563eb"}){
  return <div style={{fontSize:13,fontWeight:800,color,marginBottom:10}}>{children}</div>;
}
function Input({label,...props}){
  return(
    <div style={{marginBottom:11}}>
      {label&&<Lbl>{label}</Lbl>}
      <input {...props} style={{width:"100%",boxSizing:"border-box",padding:"12px 13px",borderRadius:10,border:"1.5px solid #e2e8f0",fontSize:16,background:"#f8fafc",color:"#0f172a",fontFamily:"inherit",outline:"none",...(props.style||{})}}/>
    </div>
  );
}
function Btn({children,onClick,color="#2563eb",style={},small,disabled}){
  return(
    <button onClick={onClick} disabled={disabled} style={{background:disabled?"#e2e8f0":color,color:disabled?"#94a3b8":"#fff",border:"none",borderRadius:small?8:12,padding:small?"6px 12px":"13px",fontSize:small?12:15,fontWeight:700,cursor:disabled?"not-allowed":"pointer",width:small?"auto":"100%",fontFamily:"inherit",...style}}>
      {children}
    </button>
  );
}
function StatBox({icon,label,value,color,bg}){
  return(
    <div style={{background:bg,borderRadius:14,padding:"13px 8px",textAlign:"center",border:`1.5px solid ${color}22`}}>
      <div style={{fontSize:22}}>{icon}</div>
      <div style={{fontSize:15,fontWeight:800,color,marginTop:3}}>{value}</div>
      <div style={{fontSize:9,color:"#94a3b8",marginTop:2,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5}}>{label}</div>
    </div>
  );
}
function ProductPicker({value,onChange}){
  return(
    <div style={{marginBottom:13}}>
      <Lbl>Product</Lbl>
      <div style={{display:"flex",gap:6}}>
        {PRODUCTS.map(p=>(
          <button key={p.id} onClick={()=>onChange(p.id)} style={{flex:1,padding:"9px 3px",borderRadius:11,border:"2px solid",borderColor:value===p.id?p.color:"#e2e8f0",background:value===p.id?p.bg:"#f8fafc",color:value===p.id?p.color:"#94a3b8",cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:10,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            <span style={{fontSize:20}}>{p.icon}</span><span>{p.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}
function SearchBar({value,onChange,placeholder="Search…"}){
  return(
    <div style={{position:"relative",marginBottom:10}}>
      <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:14,color:"#94a3b8"}}>🔍</span>
      <input value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={{width:"100%",boxSizing:"border-box",padding:"11px 35px",borderRadius:10,border:"1.5px solid #e2e8f0",fontSize:14,background:"#f8fafc",color:"#0f172a",fontFamily:"inherit",outline:"none"}}/>
      {value&&<span onClick={()=>onChange("")} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",cursor:"pointer",color:"#94a3b8",fontSize:16}}>✕</span>}
    </div>
  );
}

// ── EDIT MODAL ────────────────────────────────────────────────────────
function EditModal({entry,type,onSave,onClose}){
  const p=getP(entry.product||"milk");
  const [form,setForm]=useState({...entry});
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const nameKey=type==="stockin"?"supplier":"customer";
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:999,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{background:"#fff",borderRadius:"20px 20px 0 0",padding:"18px 16px 36px",width:"100%",maxWidth:540,maxHeight:"92vh",overflowY:"auto",boxSizing:"border-box"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div style={{fontSize:16,fontWeight:800,color:"#0f172a"}}>✏️ Edit Entry</div>
          <button onClick={onClose} style={{background:"#f1f5f9",border:"none",borderRadius:8,padding:"6px 11px",cursor:"pointer",fontSize:16}}>✕</button>
        </div>
        <ProductPicker value={form.product||"milk"} onChange={v=>setForm(f=>({...f,product:v}))}/>
        <Input label="Date" type="date" value={form.date} onChange={e=>set("date",e.target.value)}/>
        <Input label={type==="stockin"?"Supplier Name":"Customer Name"} value={form[nameKey]||""} onChange={e=>set(nameKey,e.target.value)}/>
        <div style={{display:"flex",gap:10}}>
          <div style={{flex:1}}><Input label={`Qty (${p.unit})`} type="number" value={form.qty} onChange={e=>set("qty",parseFloat(e.target.value)||0)}/></div>
          <div style={{flex:1}}><Input label={`Rate ₹/${p.unit}`} type="number" value={form.rate} onChange={e=>set("rate",parseFloat(e.target.value)||0)}/></div>
        </div>
        {type==="sales"&&(
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            {[true,false].map(v=>(
              <button key={String(v)} onClick={()=>set("paid",v)} style={{flex:1,padding:"11px",borderRadius:10,border:"2px solid",borderColor:form.paid===v?(v?"#059669":"#dc2626"):"#e2e8f0",background:form.paid===v?(v?"#ecfdf5":"#fef2f2"):"#f8fafc",color:form.paid===v?(v?"#059669":"#dc2626"):"#94a3b8",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>
                {v?"✓ Paid":"⏳ Due"}
              </button>
            ))}
          </div>
        )}
        <Input label="Notes (optional)" value={form.notes||""} onChange={e=>set("notes",e.target.value)}/>
        <Btn onClick={()=>onSave(form)}>Save Changes</Btn>
      </div>
    </div>
  );
}

// ── ENTRY CARD ─────────────────────────────────────────────────────────
function EntryCard({e,type,onDelete,onEdit,onMarkPaid}){
  const pr=getP(e.product);
  return(
    <Card>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:4,flexWrap:"wrap"}}>
            <span style={{background:pr.bg,color:pr.color,borderRadius:7,padding:"2px 8px",fontSize:11,fontWeight:800}}>{pr.icon} {pr.label}</span>
            {type==="sales"&&<span style={{background:e.paid?"#ecfdf5":"#fef2f2",color:e.paid?"#059669":"#dc2626",borderRadius:7,padding:"2px 8px",fontSize:11,fontWeight:700}}>{e.paid?"✓ Paid":"⏳ Due"}</span>}
          </div>
          <div style={{fontSize:15,fontWeight:700,color:"#0f172a"}}>{type==="stockin"?e.supplier:e.customer}</div>
          <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>{fmtDate(e.date)} · {fmtQty(e.qty,pr.unit)} @ {fmtCur(e.rate)}/{pr.unit}</div>
          {type==="sales"&&<div style={{fontSize:15,fontWeight:800,color:e.paid?"#059669":"#dc2626",marginTop:3}}>{fmtCur(e.qty*e.rate)}</div>}
          {e.notes&&<div style={{fontSize:11,color:"#94a3b8",marginTop:3,fontStyle:"italic"}}>📝 {e.notes}</div>}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:5,marginLeft:8,alignItems:"flex-end",flexShrink:0}}>
          {type==="sales"&&!e.paid&&<Btn onClick={()=>onMarkPaid(e.id)} color="#059669" small>✓ Paid</Btn>}
          <div style={{display:"flex",gap:5}}>
            <button onClick={()=>onEdit(e)} style={{background:"#eff6ff",border:"none",borderRadius:8,padding:"7px 9px",cursor:"pointer",fontSize:14}}>✏️</button>
            <button onClick={()=>onDelete(e.id)} style={{background:"#fef2f2",border:"none",borderRadius:8,padding:"7px 9px",cursor:"pointer",fontSize:14}}>🗑️</button>
          </div>
        </div>
      </div>
    </Card>
  );
}

// ── HOME TAB ──────────────────────────────────────────────────────────
function HomeTab({stockIn,sales,settings}){
  const t=today();
  const todayIn    =stockIn.filter(e=>e.date===t).reduce((s,e)=>s+e.qty,0);
  const todaySold  =sales.filter(e=>e.date===t).reduce((s,e)=>s+e.qty,0);
  const todayRev   =sales.filter(e=>e.date===t&&e.paid).reduce((s,e)=>s+e.qty*e.rate,0);
  const totalDues  =sales.filter(e=>!e.paid).reduce((s,e)=>s+e.qty*e.rate,0);
  const totalEarned=sales.filter(e=>e.paid).reduce((s,e)=>s+e.qty*e.rate,0);
  const monthEarned=sales.filter(e=>e.paid&&monthOf(e.date)===nowMonth()).reduce((s,e)=>s+e.qty*e.rate,0);

  const stockMap={};
  PRODUCTS.forEach(p=>{stockMap[p.id]=0;});
  stockIn.forEach(e=>{stockMap[e.product]=(stockMap[e.product]||0)+e.qty;});
  sales.forEach(e=>{stockMap[e.product]=(stockMap[e.product]||0)-e.qty;});

  const duesMap={};
  sales.filter(e=>!e.paid).forEach(e=>{duesMap[e.customer]=(duesMap[e.customer]||0)+e.qty*e.rate;});
  const topDues=Object.entries(duesMap).sort((a,b)=>b[1]-a[1]).slice(0,3);
  const recent=[...sales].sort((a,b)=>b.id-a.id).slice(0,5);

  function shareWhatsApp(){
    const lowStock=PRODUCTS.filter(p=>(stockMap[p.id]||0)<(settings?.thresholds?.[p.id]??5));
    const lines=[`🥛 *Dairy Report — ${fmtDate(t)}*`,"",`📥 Received: ${todayIn.toFixed(1)}L`,`🛒 Sold: ${todaySold.toFixed(1)}L`,`💰 Today: ${fmtCur(todayRev)}`,`📦 Total Earned: ${fmtCur(totalEarned)}`,`📒 Dues: ${fmtCur(totalDues)}`];
    if(lowStock.length) lines.push("","⚠️ Low Stock: "+lowStock.map(p=>`${p.icon}${p.label}`).join(", "));
    if(topDues.length){lines.push("","📒 Top Dues:");topDues.forEach(([n,a])=>lines.push(`  • ${n}: ${fmtCur(a)}`));}
    window.open(`https://wa.me/?text=${encodeURIComponent(lines.join("\n"))}`,"_blank");
  }

  return(
    <div>
      <div style={{background:"linear-gradient(135deg,#2563eb,#1d4ed8)",borderRadius:20,padding:"20px 18px",marginBottom:14,color:"#fff",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:22,fontWeight:900}}>Good Day! 👋</div>
          <div style={{fontSize:12,opacity:0.8,marginTop:3}}>{fmtDate(t)}</div>
        </div>
        <button onClick={shareWhatsApp} style={{background:"rgba(255,255,255,0.2)",border:"none",borderRadius:12,padding:"10px 14px",color:"#fff",cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:12,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
          <span style={{fontSize:20}}>📤</span><span>Share</span>
        </button>
      </div>

      <Lbl>Today's Summary</Lbl>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
        <StatBox icon="⬇️" label="Received" value={`${todayIn.toFixed(1)}L`} color="#059669" bg="#ecfdf5"/>
        <StatBox icon="🛒" label="Sold" value={`${todaySold.toFixed(1)}L`} color="#b45309" bg="#fffbeb"/>
        <StatBox icon="💰" label="Today Earned" value={fmtCur(todayRev)} color="#2563eb" bg="#eff6ff"/>
        <StatBox icon="📒" label="Total Dues" value={fmtCur(totalDues)} color="#dc2626" bg="#fef2f2"/>
      </div>

      <Lbl>Current Stock</Lbl>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
        {PRODUCTS.map(p=>{
          const net=stockMap[p.id]||0;
          const low=net<(settings?.thresholds?.[p.id]??5);
          return <StatBox key={p.id} icon={p.icon} label={p.label} value={`${net.toFixed(1)} ${p.unit}`} color={low?"#dc2626":p.color} bg={low?"#fef2f2":p.bg}/>;
        })}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
        <Card style={{margin:0,textAlign:"center"}}><Lbl>Total Earned</Lbl><div style={{fontSize:20,fontWeight:900,color:"#059669"}}>{fmtCur(totalEarned)}</div></Card>
        <Card style={{margin:0,textAlign:"center"}}><Lbl>This Month</Lbl><div style={{fontSize:20,fontWeight:900,color:"#2563eb"}}>{fmtCur(monthEarned)}</div></Card>
      </div>

      {topDues.length>0&&(
        <Card style={{border:"1.5px solid #fecaca"}}>
          <SecTitle color="#dc2626">⏰ Pending Dues</SecTitle>
          {topDues.map(([name,amt])=>(
            <div key={name} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #fef2f2"}}>
              <span style={{fontSize:14,color:"#0f172a",fontWeight:600}}>{name}</span>
              <span style={{fontSize:14,fontWeight:800,color:"#dc2626"}}>{fmtCur(amt)}</span>
            </div>
          ))}
        </Card>
      )}

      {recent.length>0&&(
        <Card>
          <SecTitle>🕐 Recent Sales</SecTitle>
          {recent.map(e=>{
            const pr=getP(e.product);
            return(
              <div key={e.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #f8fafc"}}>
                <div><div style={{fontSize:13,fontWeight:700,color:"#0f172a"}}>{pr.icon} {e.customer}</div><div style={{fontSize:11,color:"#94a3b8"}}>{fmtDate(e.date)} · {fmtQty(e.qty,pr.unit)}</div></div>
                <div style={{textAlign:"right"}}><div style={{fontSize:13,fontWeight:800,color:e.paid?"#059669":"#dc2626"}}>{fmtCur(e.qty*e.rate)}</div><div style={{fontSize:10,color:e.paid?"#059669":"#dc2626"}}>{e.paid?"✓ Paid":"Due"}</div></div>
              </div>
            );
          })}
        </Card>
      )}

      {sales.length===0&&stockIn.length===0&&(
        <Card style={{textAlign:"center",padding:40}}>
          <div style={{fontSize:52}}>🥛</div>
          <div style={{fontWeight:800,fontSize:17,color:"#2563eb",marginTop:12}}>Welcome to Dairy Manager!</div>
          <div style={{color:"#94a3b8",fontSize:13,marginTop:6}}>Stock ya Sales tab se shuru karein.</div>
        </Card>
      )}
    </div>
  );
}

// ── STOCK IN TAB ──────────────────────────────────────────────────────
function StockInTab({stockIn,setStockIn}){
  const [product,setProduct]=useState("milk");
  const [date,setDate]=useState(today());
  const [supplier,setSupplier]=useState("");
  const [qty,setQty]=useState("");
  const [rate,setRate]=useState("");
  const [notes,setNotes]=useState("");
  const [flash,setFlash]=useState(false);
  const [search,setSearch]=useState("");
  const [filterP,setFilterP]=useState("all");
  const [editEntry,setEditEntry]=useState(null);
  const pr=getP(product);

  async function add(){
    if(!supplier.trim()||!qty) return;
    const e={id:Date.now(),product,date,supplier:supplier.trim(),qty:parseFloat(qty),rate:parseFloat(rate)||0,notes:notes.trim()};
    const u=[e,...stockIn]; setStockIn(u); await save("dairy-stock-in",u);
    setSupplier("");setQty("");setRate("");setNotes("");
    setFlash(true);setTimeout(()=>setFlash(false),1600);
  }
  async function del(id){const u=stockIn.filter(e=>e.id!==id);setStockIn(u);await save("dairy-stock-in",u);}
  async function saveEdit(updated){const u=stockIn.map(e=>e.id===updated.id?updated:e);setStockIn(u);await save("dairy-stock-in",u);setEditEntry(null);}

  const filterOpts=[{id:"all",label:"All",color:"#2563eb",bg:"#eff6ff"},...PRODUCTS.map(p=>({id:p.id,label:`${p.icon} ${p.label}`,color:p.color,bg:p.bg}))];
  const shown=[...stockIn].sort((a,b)=>b.id-a.id).filter(e=>(filterP==="all"||e.product===filterP)&&(!search||e.supplier.toLowerCase().includes(search.toLowerCase())));

  return(
    <div>
      {editEntry&&<EditModal entry={editEntry} type="stockin" onSave={saveEdit} onClose={()=>setEditEntry(null)}/>}
      <Card>
        <SecTitle>⬇️ Add Stock Received</SecTitle>
        <ProductPicker value={product} onChange={setProduct}/>
        <Input label="Date" type="date" value={date} onChange={e=>setDate(e.target.value)}/>
        <Input label="Supplier Name" placeholder="e.g. Ramu Dairy…" value={supplier} onChange={e=>setSupplier(e.target.value)}/>
        <div style={{display:"flex",gap:10}}>
          <div style={{flex:1}}><Input label={`Qty (${pr.unit})`} type="number" placeholder="40" value={qty} onChange={e=>setQty(e.target.value)}/></div>
          <div style={{flex:1}}><Input label={`Rate ₹/${pr.unit}`} type="number" placeholder="50" value={rate} onChange={e=>setRate(e.target.value)}/></div>
        </div>
        <Input label="Notes (optional)" placeholder="Any remarks…" value={notes} onChange={e=>setNotes(e.target.value)}/>
        <Btn onClick={add} color={flash?"#059669":pr.color}>{flash?"✅ Entry Saved!":"Save Entry"}</Btn>
      </Card>
      <SearchBar value={search} onChange={setSearch} placeholder="Search supplier…"/>
      <div style={{display:"flex",gap:5,marginBottom:10,overflowX:"auto",paddingBottom:2}}>
        {filterOpts.map(o=><button key={o.id} onClick={()=>setFilterP(o.id)} style={{padding:"5px 12px",borderRadius:9,border:"1.5px solid",whiteSpace:"nowrap",borderColor:filterP===o.id?o.color:"#e2e8f0",background:filterP===o.id?o.bg:"#fff",color:filterP===o.id?o.color:"#
