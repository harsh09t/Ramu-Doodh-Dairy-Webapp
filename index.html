<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dairy Manager</title>

  <!-- 1. React aur Babel Loaders -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- 2. Firebase Libraries -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    
    // Sabhi ko global window object me declare kar rahe hain taaki App.jsx ko mil sakein
    window.React = React;
    window.useState = React.useState;
    window.useEffect = React.useEffect;
    window.useRef = React.useRef;
    
    window.FirebaseApp = { initializeApp };
    window.FirebaseFirestore = { getFirestore, doc, setDoc, getDoc };
    window.firebaseIsReady = true;
  </script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f4f8ff;
      display: flex;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #root {
      width: 100%;
      max-width: 500px;
      min-height: 100vh;
      background: #fff;
      box-shadow: 0 0 20px rgba(0,0,0,0.05);
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <!-- 3. Yahan se aapki original App.jsx load hogi -->
  <!-- Humne isme automatic module wrapper lagaya hai taaki ye bina crash kiye saare components nikal sake -->
  <script type="text/babel" src="App.jsx" data-plugins="transform-modules-umd"></script>

  <!-- 4. Bootstrapping Layer: Yeh automatic dhoondhega ki aapke component ka naam kya hai -->
  <script type="text/babel">
    function AppRunner() {
      const [component, setComponent] = React.useState(null);
      const [status, setStatus] = React.useState("loading");

      React.useEffect(() => {
        let attempts = 0;
        const checker = setInterval(() => {
          attempts++;
          
          // Yeh automatic check karega ki pure page par aapka main component kis naam se aaya hai
          const FoundComponent = window.Dairy || 
                                 window.DairyApp || 
                                 (typeof Dairy !== 'undefined' ? Dairy : null) || 
                                 (typeof DairyApp !== 'undefined' ? DairyApp : null) ||
                                 (window.exports && (window.exports.default || window.exports.Dairy || window.exports.DairyApp));

          if (window.firebaseIsReady && FoundComponent) {
            setComponent(() => FoundComponent);
            setStatus("ready");
            clearInterval(checker);
          }
          
          if (attempts > 60) { // 6 seconds tak wait karega
            clearInterval(checker);
            setStatus("error");
          }
        }, 100);

        return () => clearInterval(checker);
      }, []);

      if (status === "loading") {
        return (
          <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "#f4f8ff" }}>
            <div style={{ textAlign: "center", color: "#4a90d9", fontWeight: 600 }}>
              <div style={{ fontSize: "55px" }}>🥛</div>
              <div style={{ marginTop: "10px", fontSize: "15px" }}>Starting Dairy...</div>
            </div>
          </div>
        );
      }

      if (status === "error") {
        return (
          <div style={{ padding: "24px", color: "#e53935", fontSize: "14px", lineHeight: "1.6" }}>
            <h3 style={{ margin: "0 0 8px 0" }}>⚠️ Load Alert</h3>
            <p>Bhai, file toh load ho gayi par component name mix-match ho raha hai. Ek baar mujhe apni poori 'App.jsx' file ka code copy-paste karke yahan chat me bhej de, main 2 minute me usey perfect format karke de dunga!</p>
          </div>
        );
      }

      const LiveApp = component;
      return <LiveApp />;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AppRunner />);
  </script>

</body>
</html>
