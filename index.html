<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dairy Manager</title>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    
    // Sabhi Firebase functions ko global window par expose kar rahe hain
    window.FirebaseApp = { initializeApp };
    window.FirebaseFirestore = { getFirestore, doc, setDoc, getDoc };
    window.firebaseIsReady = true;
  </script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f4f8ff;
      display: flex;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #root {
      width: 100%;
      max-width: 500px;
      min-height: 100vh;
      background: #fff;
      box-shadow: 0 0 20px rgba(0,0,0,0.05);
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Firebase Init Setup
    const firebaseConfig = {
      apiKey: "AIzaSyAxadt7Kl7pwzfgcEm6G98jvF3Ki-AB34o",
      authDomain: "dairy-manager-6d898.firebaseapp.com",
      projectId: "dairy-manager-6d898",
      storageBucket: "dairy-manager-6d898.firebasestorage.app",
      messagingSenderId: "651048776070",
      appId: "1:651048776070:web:0ca12c6bdff39e2f303c07"
    };

    // Global App Bootstrapper Loader
    function AppWrapper() {
      const [ready, setReady] = useState(false);

      useEffect(() => {
        const checkFirebase = setInterval(() => {
          if (window.firebaseIsReady) {
            setReady(true);
            clearInterval(checkFirebase);
          }
        }, 50);
        return () => clearInterval(checkFirebase);
      }, []);

      if (!ready) {
        return (
          <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "#f4f8ff" }}>
            <div style={{ textAlign: "center", color: "#4a90d9", fontWeight: 600 }}>
              <div style={{ fontSize: "55px" }}>🥛</div>
              <div style={{ marginTop: "10px", fontSize: "16px", letterSpacing: "0.5px" }}>Starting Ramu Dairy...</div>
            </div>
          </div>
        );
      }

      return <DairyManager />;
    }

    // Firebase loading wrapper functions
    async function load(key, def = []) {
      try {
        const app = window.FirebaseApp.initializeApp(firebaseConfig);
        const db = window.FirebaseFirestore.getFirestore(app);
        const snap = await window.FirebaseFirestore.getDoc(window.FirebaseFirestore.doc(db, "dairy", key));
        if (snap.exists()) return snap.data().value ?? def;
        return def;
      } catch { return def; }
    }

    async function save(key, data) {
      try {
        const app = window.FirebaseApp.initializeApp(firebaseConfig);
        const db = window.FirebaseFirestore.getFirestore(app);
        await window.FirebaseFirestore.setDoc(window.FirebaseFirestore.doc(db, "dairy", key), { value: data });
      } catch (e) { console.error("Save error:", e); }
    }

    // ── CONSTANTS ───────────────────────────────────────────────────────
    const PRODUCTS = [
      { id: "milk",   label: "Milk",   icon: "🥛", unit: "L",  color: "#4a90d9", bg: "#f0f6ff" },
      { id: "dahi",   label: "Dahi",   icon: "🥣", unit: "Kg", color: "#c47d3a", bg: "#fff8ee" },
      { id: "paneer", label: "Paneer", icon: "🧀", unit: "Kg", color: "#8e44ad", bg: "#f8f0ff" },
      { id: "mahi",   label: "Mahi",   icon: "🫙", unit: "L",  color: "#3a7d44", bg: "#f0fbf3" },
    ];

    const TABS = [
      { id: "home",    label: "Home",     icon: "🏠" },
      { id: "stockin", label: "Stock In", icon: "⬇️" },
      { id: "sales",   label: "Sales",    icon: "🛒" },
      { id: "dues",    label: "Dues",     icon: "📒" },
      { id: "reports", label: "Reports",  icon: "📊" },
    ];

    const REPORT_TABS = ["Summary","Customers","Expenses","Settings"];

    const getP   = id => PRODUCTS.find(p => p.id === id) || PRODUCTS[0];
    const today  = () => new Date().toISOString().split("T")[0];
    const fmtDate= d  => new Date(d).toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"});
    const fmtCur = n  => "₹" + parseFloat(n||0).toFixed(0);
    const fmtQty = (q,u) => `${parseFloat(q).toFixed(1)} ${u}`;
    const monthOf= d  => d?.slice(0,7);
    const nowMonth = () => today().slice(0,7);

    // ── UI ATOMS ────────────────────────────────────────────────────────
    const css = {
      card: { background:"#fff", borderRadius:18, padding:"15px", marginBottom:12,
              boxShadow:"0 2px 16px rgba(74,144,217,0.07)", border:"1px solid #e8f0fb" },
      label: { fontSize:11, color:"#6b7c93", fontWeight:700, textTransform:"uppercase",
               letterSpacing:1, marginBottom:4, display:"block" },
    };

    function Lbl({children}){ return <div style={css.label}>{children}</div>; }
    function Card({children,style={}}){ return <div style={{...css.card,...style}}>{children}</div>; }
    function SecTitle({children,color="#4a90d9"}){
      return <div style={{fontSize:13,fontWeight:800,color,marginBottom:12}}>{children}</div>;
    }

    function Input({label,...props}){
      return(
        <div style={{marginBottom:12}}>
          {label&&<Lbl>{label}</Lbl>}
          <input {...props} style={{
            width:"100%",boxSizing:"border-box",padding:"12px 14px",borderRadius:12,
            border:"1.5px solid #dce4ef",fontSize:15,background:"#f8fbff",
            color:"#1a2a3a",fontFamily:"inherit",outline:"none",...(props.style||{})
          }}/>
        </div>
      );
    }

    function Btn({children,onClick,color="#4a90d9",style={},small,outline}){
      return(
        <button onClick={onClick} style={{
          background:outline?"transparent":color,
          color:outline?color:"#fff",
          border:outline?`2px solid ${color}`:"none",
          borderRadius:small?8:14, padding:small?"6px 12px":"14px",
          fontSize:small?12:15, fontWeight:700, cursor:"pointer",
          width:small?"auto":"100%", fontFamily:"inherit",...style
        }}>{children}</button>
      );
    }

    function StatBox({icon,label,value,color,bg}){
      return(
        <div style={{background:bg,borderRadius:16,padding:"12px 8px",textAlign:"center",
                     border:`1.5px solid ${color}22`}}>
          <div style={{fontSize:22}}>{icon}</div>
          <div style={{fontSize:16,fontWeight:800,color,marginTop:3}}>{value}</div>
          <div style={{fontSize:10,color:"#7a90aa",marginTop:2,fontWeight:600}}>{label}</div>
        </div>
      );
    }

    function ProductPicker({value,onChange}){
      return(
        <div style={{marginBottom:14}}>
          <Lbl>Product</Lbl>
          <div style={{display:"flex",gap:7}}>
            {PRODUCTS.map(p=>(
              <button key={p.id} onClick={()=>onChange(p.id)} style={{
                flex:1,padding:"9px 4px",borderRadius:12,border:"2px solid",
                borderColor:value===p.id?p.color:"#dce4ef",
                background:value===p.id?p.bg:"#f8fbff",
                color:value===p.id?p.color:"#9aafcc",
                cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:10,
                display:"flex",flexDirection:"column",alignItems:"center",gap:2,
              }}>
                <span style={{fontSize:20}}>{p.icon}</span>
                <span>{p.label}</span>
              </button>
            ))}
          </div>
        </div>
      );
    }

    function SearchBar({value,onChange,placeholder="Search…"}){
      return(
        <div style={{position:"relative",marginBottom:12}}>
          <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:14,color:"#9aafcc"}}>🔍</span>
          <input value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
            style={{width:"100%",boxSizing:"border-box",padding:"10px 12px 10px 34px",
              borderRadius:12,border:"1.5px solid #dce4ef",fontSize:14,
              background:"#f8fbff",color:"#1a2a3a",fontFamily:"inherit",outline:"none"}}/>
          {value&&<span onClick={()=>onChange("")} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",cursor:"pointer",color:"#9aafcc",fontSize:16}}>✕</span>}
        </div>
      );
    }

    // Edit Modal
    function EditModal({entry,type,onSave,onClose}){
      const p = getP(entry.product||"milk");
      const [form,setForm] = useState({...entry});
      const set = (k,v) => setForm(f=>({...f,[k]:v}));

      return(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:500,display:"flex",alignItems:"flex-end"}}>
          <div style={{background:"#fff",borderRadius:"24px 24px 0 0",padding:"20px 16px 32px",width:"100%",maxHeight:"90vh",overflowY:"auto",boxSizing:"border-box"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <div style={{fontSize:16,fontWeight:800,color:"#1a2a3a"}}>✏️ Edit Entry</div>
              <button onClick={onClose} style={{background:"#f0f4fa",border:"none",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:16}}>✕</button>
            </div>
            <Input label="Date" type="date" value={form.date} onChange={e=>set("date",e.target.value)}/>
            <Input label={type==="stockin"?"Supplier Name":"Customer Name"}
              value={form[type==="stockin"?"supplier":"customer"]||""}
              onChange={e=>set(type==="stockin"?"supplier":"customer",e.target.value)}/>
            <div style={{display:"flex",gap:10}}>
              <div style={{flex:1}}><Input label={`Qty (${p.unit})`} type="number" value={form.qty} onChange={e=>set("qty",parseFloat(e.target.value)||0)}/></div>
              <div style={{flex:1}}><Input label={`Rate ₹/${p.unit}`} type="number" value={form.rate} onChange={e=>set("rate",parseFloat(e.target.value)||0)}/></div>
            </div>
            <Input label="Notes (optional)" placeholder="Any remarks…" value={form.notes||""} onChange={e=>set("notes",e.target.value)}/>
            <Btn onClick={()=>onSave(form)} color="#4a90d9">Save Changes</Btn>
          </div>
        </div>
      );
    }

    // Entry card
    function EntryCard({e,type,onDelete,onEdit,onMarkPaid}){
      const pr = getP(e.product);
      return(
        <Card>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                <span style={{background:pr.bg,color:pr.color,borderRadius:8,padding:"2px 8px",fontSize:11,fontWeight:800}}>{pr.icon} {pr.label}</span>
              </div>
              <div style={{fontSize:15,fontWeight:700,color:"#1a2a3a"}}>{type==="stockin"?e.supplier:e.customer}</div>
              <div style={{fontSize:11,color:"#7a90aa",marginTop:2}}>{fmtDate(e.date)} · {fmtQty(e.qty,pr.unit)} @ {fmtCur(e.rate)}/{pr.unit}</div>
              {type==="sales"&&(
                <div style={{fontSize:15,fontWeight:800,color:e.paid?"#3a7d44":"#e53935",marginTop:3}}>
                  {fmtCur(e.qty*e.rate)} <span style={{fontSize:11,fontWeight:500}}>{e.paid?"✓ Paid":"⏳ Due"}</span>
                </div>
              )}
              {e.notes&&<div style={{fontSize:11,color:"#8a9ab0",marginTop:3,fontStyle:"italic"}}>📝 {e.notes}</div>}
            </div>
            <div style={{display:"flex",gap:5,marginLeft:8,flexDirection:"column",alignItems:"flex-end"}}>
              {type==="sales"&&!e.paid&&<Btn onClick={()=>onMarkPaid(e.id)} color="#3a7d44" small>✓ Paid</Btn>}
              <div style={{display:"flex",gap:5}}>
                <button onClick={()=>onEdit(e)} style={{background:"#f0f6ff",border:"none",borderRadius:8,padding:"7px 9px",cursor:"pointer",fontSize:13}}>✏️</button>
                <button onClick={()=>onDelete(e.id)} style={{background:"#fff0ee",border:"none",borderRadius:8,padding:"7px 9px",cursor:"pointer",fontSize:13}}>🗑️</button>
              </div>
            </div>
          </div>
        </Card>
      );
    }

    // ── HOME TAB ────────────────────────────────────────────────────────────
    function HomeTab({stockIn,sales,settings}){
      const t = today();
      const todayIn     = stockIn.filter(e=>e.date===t).reduce((s,e)=>s+e.qty,0);
      const todaySold   = sales.filter(e=>e.date===t).reduce((s,e)=>s+e.qty,0);
      const todayRev    = sales.filter(e=>e.date===t&&e.paid).reduce((s,e)=>s+e.qty*e.rate,0);
      const totalDues   = sales.filter(e=>!e.paid).reduce((s,e)=>s+e.qty*e.rate,0);
      const totalEarned = sales.filter(e=>e.paid).reduce((s,e)=>s+e.qty*e.rate,0);

      const stockMap={};
      PRODUCTS.forEach(p=>{stockMap[p.id]=0;});
      stockIn.forEach(e=>{stockMap[e.product]=(stockMap[e.product]||0)+e.qty;});
      sales.forEach(e=>{stockMap[e.product]=(stockMap[e.product]||0)-e.qty;});

      const duesMap={};
      sales.filter(e=>!e.paid).forEach(e=>{duesMap[e.customer]=(duesMap[e.customer]||0)+e.qty*e.rate;});
      const topDues=Object.entries(duesMap).sort((a,b)=>b[1]-a[1]).slice(0,3);
      const recent=[...sales].sort((a,b)=>b.id-a.id).slice(0,4);

      function shareWhatsApp(){
        const lowStock=PRODUCTS.filter(p=>{const th=settings?.thresholds?.[p.id]??5; return (stockMap[p.id]||0)<th;});
        const lines=[
          `🥛 *Dairy Report — ${fmtDate(t)}*`,``,
          `📥 Received: ${todayIn.toFixed(1)}L`,
          `🛒 Sold: ${todaySold.toFixed(1)}L`,
          `💰 Earnings: ${fmtCur(todayRev)}`,
          `📦 Total Earned: ${fmtCur(totalEarned)}`,
          `📒 Pending Dues: ${fmtCur(totalDues)}`,
        ];
        if(lowStock.length) lines.push(``,`⚠️ Low Stock: `+lowStock.map(p=>`${p.icon}${p.label}`).join(", "));
        if(topDues.length){lines.push(``,"📒 Top Dues:");topDues.forEach(([n,a])=>lines.push(`  • ${n}: ${fmtCur(a)}`));}
        const text=encodeURIComponent(lines.join("\n"));
        window.open(`https://wa.me/?text=${text}`,"_blank");
      }

      return(
        <div>
          <div style={{background:"linear-gradient(135deg,#4a90d9,#357abd)",borderRadius:20,padding:"18px 20px",marginBottom:16,color:"#fff",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:22,fontWeight:900}}>Good Day! 👋</div>
              <div style={{fontSize:13,opacity:0.85,marginTop:2}}>Today: {fmtDate(t)}</div>
            </div>
            <button onClick={shareWhatsApp} style={{background:"rgba(255,255,255,0.2)",border:"none",borderRadius:12,padding:"10px 14px",color:"#fff",cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:12,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
              <span style={{fontSize:20}}>📤</span><span>Share</span>
            </button>
          </div>

          <Lbl>Today's Summary</Lbl>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
            <StatBox icon="⬇️" label="Received" value={`${todayIn.toFixed(1)}L`} color="#3a7d44" bg="#f0fbf3"/>
            <StatBox icon="🛒" label="Sold" value={`${todaySold.toFixed(1)}L`} color="#c47d3a" bg="#fff8ee"/>
            <StatBox icon="💰" label="Today's Earnings" value={fmtCur(todayRev)} color="#4a90d9" bg="#f0f6ff"/>
            <StatBox icon="📒" label="Total Dues" value={fmtCur(totalDues)} color="#e53935" bg="#fff0ee"/>
          </div>

          <Lbl>Current Stock</Lbl>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
            {PRODUCTS.map(p=>{
              const net=stockMap[p.id]||0;
              const th=settings?.thresholds?.[p.id]??5;
              const low=net<th;
              return <StatBox key={p.id} icon={p.icon} label={p.label} value={`${net.toFixed(1)} ${p.unit}`} color={low?"#e53935":p.color} bg={low?"#fff0ee":p.bg}/>;
            })}
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
            <Card style={{margin:0,textAlign:"center"}}>
              <Lbl>Total Earned</Lbl>
              <div style={{fontSize:20,fontWeight:900,color:"#3a7d44"}}>{fmtCur(totalEarned)}</div>
            </Card>
            <Card style={{margin:0,textAlign:"center"}}>
              <Lbl>This Month</Lbl>
              <div style={{fontSize:20,fontWeight:900,color:"#4a90d9"}}>{fmtCur(sales.filter(e=>e.paid&&monthOf(e.date)===nowMonth()).reduce((s,e)=>s+e.qty*e.rate,0))}</div>
            </Card>
          </div>

          {topDues.length>0&&(
            <Card style={{border:"1.5px solid #ffd0cc"}}>
              <SecTitle color="#e53935">⏰ Pending Dues</SecTitle>
              {topDues.map(([name,amt])=>(
                <div key={name} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid #fef0ee"}}>
                  <span style={{fontSize:14,color:"#1a2a3a",fontWeight:600}}>{name}</span>
                  <span style={{fontSize:14,fontWeight:800,color:"#e53935"}}>{fmtCur(amt)}</span>
                </div>
              ))}
            </Card>
          )}
        </div>
      );
    }

    // ── STOCK IN TAB ────────────────────────────────────────────────────
    function StockInTab({stockIn,setStockIn}){
      const [product,setProduct]=useState("milk");
      const [date,setDate]=useState(today());
      const [supplier,setSupplier]=useState("");
      const [qty,setQty]=useState("");
      const [rate,setRate]=useState("");
      const [notes,setNotes]=useState("");
      const [flash,setFlash]=useState(false);
      const [search,setSearch]=useState("");
      const [filterP,setFilterP]=useState("all");
      const [editEntry,setEditEntry]=useState(null);

      const pr=getP(product);

      async function add(){
        if(!supplier.trim()||!qty)return;
        const e={id:Date.now(),product,date,supplier:supplier.trim(),qty:parseFloat(qty),rate:parseFloat(rate)||0,notes:notes.trim()};
        const u=[e,...stockIn]; setStockIn(u); await save("dairy-stock-in",u);
        setSupplier("");setQty("");setRate("");setNotes("");
        setFlash(true);setTimeout(()=>setFlash(false),1600);
      }

      async function del(id){const u=stockIn.filter(e=>e.id!==id);setStockIn(u);await save("dairy-stock-in",u);}
      async function saveEdit(updated){
        const u=stockIn.map(e=>e.id===updated.id?updated:e);
        setStockIn(u);await save("dairy-stock-in",u);setEditEntry(null);
      }

      const shown=[...stockIn].sort((a,b)=>b.id-a.id).filter(e=>(filterP=="all"||e.product==filterP)&&(!search||e.supplier.toLowerCase().includes(search.toLowerCase())));

      return(
        <div>
          {editEntry&&<EditModal entry={editEntry} type="stockin" onSave={saveEdit} onClose={()=>setEditEntry(null)}/>}
          <Card>
            <SecTitle>⬇️ Add Stock Received</SecTitle>
            <ProductPicker value={product} onChange={setProduct}/>
            <Input label="Date" type="date" value={date} onChange={e=>setDate(e.target.value)}/>
            <Input label="Supplier Name" placeholder="e.g. Ramu, Shyam Dairy…" value={supplier} onChange={e=>setSupplier(e.target.value)}/>
            <div style={{display:"flex",gap:10}}>
              <div style={{flex:1}}><Input label={`Qty (${pr.unit})`} type="number" placeholder="40" value={qty} onChange={e=>setQty(e.target.value)}/></div>
