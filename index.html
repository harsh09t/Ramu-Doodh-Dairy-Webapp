<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dairy Manager</title>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    
    window.React = React;
    window.useState = React.useState;
    window.useEffect = React.useEffect;
    
    window.FirebaseApp = { initializeApp };
    window.FirebaseFirestore = { getFirestore, doc, setDoc, getDoc };
    window.firebaseLoaded = true;
  </script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f4f8ff;
      display: flex;
      justify-content: center;
    }
    #root {
      width: 100%;
      max-width: 500px;
      min-height: 100vh;
      background: #fff;
      box-shadow: 0 0 20px rgba(0,0,0,0.05);
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    function AppBootstrapper() {
      const [ready, setReady] = React.useState(false);
      const [error, setError] = React.useState(null);

      React.useEffect(() => {
        const checkGlobals = setInterval(() => {
          // Hum check kar rahe hain ki aapka original component global scope me aaya ya nahi
          const MainComponent = window.Dairy || (typeof Dairy !== 'undefined' ? Dairy : null);
          
          if (window.firebaseLoaded && MainComponent) {
            window.ActualDairyComponent = MainComponent;
            setReady(true);
            clearInterval(checkGlobals);
          }
        }, 100);

        const timeout = setTimeout(() => {
          clearInterval(checkGlobals);
          if (!window.ActualDairyComponent) {
            setError("App.jsx load toh hua par browser ko aapke main component ka naam nahi mila. Ek baar check karo ki main component ka naam 'Dairy' hi hai na?");
          }
        }, 6000);

        return () => { clearInterval(checkGlobals); clearTimeout(timeout); };
      }, []);

      if (error) {
        return (
          <div style={{ padding: "20px", color: "#e53935", fontFamily: "sans-serif", fontSize: "14px", lineHeight: "1.5" }}>
            <h3>⚠️ Configuration Alert</h3>
            <p>{error}</p>
          </div>
        );
      }

      if (!ready) {
        return (
          <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "#f4f8ff" }}>
            <div style={{ textAlign: "center", fontFamily: "Georgia,serif", color: "#7a90aa", fontWeight: 600 }}>
              <div style={{ fontSize: "48px" }}>🥛</div>
              <div>Starting Dairy...</div>
            </div>
          </div>
        );
      }

      const TargetApp = window.ActualDairyComponent;
      return <TargetApp />;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AppBootstrapper />);
  </script>

  <script type="text/babel" src="App.jsx" data-plugins="transform-modules-umd"></script>

  <script type="text/babel">
    // Agar component ka naam Dairy hai toh use window par bind karo
    setTimeout(() => {
      if (typeof Dairy !== 'undefined') {
        window.Dairy = Dairy;
      } else if (window.exports && window.exports.Dairy) {
        window.Dairy = window.exports.Dairy;
      } else if (window.exports && window.exports.default) {
        window.Dairy = window.exports.default;
      }
    }, 200);
  </script>

</body>
</html>
